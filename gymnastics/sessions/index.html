<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Session Builder · Coach Tools</title>
<meta name="theme-color" content="#7B3FA0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F5F1E8; --paper:#FBF8F1; --ink:#15191E;
  --ink-soft:#3A4049; --muted:#6B7280; --rule:#DAD3C4;
  --accent:#F2B705;
  --gym:#7B3FA0; --gym-soft:#EDE5F7;
  --y13:#E26D2B; --y13-soft:#FAEADE;
  --y46:#1A6B8A; --y46-soft:#D6EEF5;
  --support:#C8102E; --support-soft:#FAE2E5;
  --core:#1A6B8A; --core-soft:#D6EEF5;
  --extend:#2E7D52; --extend-soft:#D4EDE0;
  --danger:#C8102E;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--ink);font-family:'Manrope',sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;}
body{padding:24px 18px 60px;}
.board{max-width:1100px;margin:0 auto;}

.crumb{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
.crumb a{color:var(--ink-soft);text-decoration:none;}
.crumb a:hover{color:var(--gym);}
.crumb .sep{margin:0 8px;opacity:.5;}

.page-head{background:var(--ink);color:var(--paper);border-radius:6px;padding:22px 26px;position:relative;overflow:hidden;border:2px solid var(--ink);margin-bottom:16px;display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap;}
.page-head::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(135deg,rgba(255,255,255,.025) 0 2px,transparent 2px 14px);pointer-events:none;}
.page-head-inner{position:relative;z-index:1;}
.page-head h1{font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(26px,5vw,42px);letter-spacing:.03em;text-transform:uppercase;line-height:1;margin-bottom:5px;}
.page-head h1 .accent{color:var(--accent);}
.page-head .meta{font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(255,255,255,.5);letter-spacing:.1em;text-transform:uppercase;}
.head-link{position:relative;z-index:1;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.7);text-decoration:none;border:1.5px solid rgba(255,255,255,.4);border-radius:6px;padding:8px 14px;transition:all .12s;}
.head-link:hover{color:var(--paper);border-color:var(--paper);}

/* TABS */
.tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.tab-btn{font-family:'Oswald',sans-serif;font-weight:600;font-size:13px;letter-spacing:.06em;text-transform:uppercase;padding:9px 18px;border:1.5px solid var(--ink);border-radius:6px;background:var(--paper);color:var(--ink);cursor:pointer;transition:all .12s;}
.tab-btn.active{background:var(--gym);color:var(--paper);border-color:var(--gym);}

/* BUILDER FORM */
.builder-card{background:var(--paper);border:1.5px solid var(--ink);border-radius:6px;padding:20px 24px;margin-bottom:14px;}
.section-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gym);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.section-label::before{content:"";width:6px;height:6px;background:var(--gym);border-radius:50%;}

.form-row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px;}
.form-group{display:flex;flex-direction:column;gap:5px;flex:1;min-width:180px;}
.form-group label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
.form-group input,.form-group select,.form-group textarea{
  background:var(--bg);border:1.5px solid var(--ink);border-radius:4px;
  padding:8px 10px;font-family:'Manrope',sans-serif;font-size:14px;color:var(--ink);
  outline:none;transition:border-color .12s;width:100%;
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--gym);}

/* AGE TOGGLE */
.age-toggle{display:flex;gap:0;border:1.5px solid var(--ink);border-radius:6px;overflow:hidden;width:fit-content;}
.age-btn{font-family:'Oswald',sans-serif;font-weight:600;font-size:13px;letter-spacing:.06em;text-transform:uppercase;padding:8px 18px;border:none;background:var(--paper);color:var(--ink);cursor:pointer;transition:all .12s;border-right:1px solid var(--ink);}
.age-btn:last-child{border-right:none;}
.age-btn:hover{background:rgba(0,0,0,.04);}
.age-btn.active.y13{background:var(--y13);color:var(--paper);}
.age-btn.active.y46{background:var(--y46);color:var(--paper);}

.build-btn{font-family:'Oswald',sans-serif;font-weight:700;font-size:16px;letter-spacing:.08em;text-transform:uppercase;padding:12px 28px;background:var(--gym);color:var(--paper);border:2px solid var(--ink);border-radius:6px;cursor:pointer;transition:all .12s;display:inline-flex;align-items:center;gap:8px;}
.build-btn:hover{transform:translate(-2px,-2px);box-shadow:4px 4px 0 var(--ink);}
.build-btn:disabled{opacity:.6;cursor:wait;transform:none;box-shadow:none;}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:var(--paper);border-radius:50%;animation:spin .7s linear infinite;display:none;}
.build-btn.loading .spinner{display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}

/* SAVED SESSIONS LIST */
.saved-list{display:flex;flex-direction:column;gap:8px;}
.saved-row{background:var(--paper);border:1.5px solid var(--ink);border-radius:6px;padding:12px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .12s;}
.saved-row:hover{transform:translate(-2px,-2px);box-shadow:3px 3px 0 var(--ink);}
.saved-row-main{flex:1;}
.saved-row-name{font-family:'Oswald',sans-serif;font-weight:700;font-size:15px;text-transform:uppercase;}
.saved-row-meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:2px;}
.empty-state{background:var(--paper);border:1.5px dashed var(--rule);border-radius:6px;padding:40px 24px;text-align:center;color:var(--muted);font-size:14px;}

/* ═══════════════════════ PLAN OUTPUT ═══════════════════════ */
#plan-output{display:none;}
.plan-header{background:var(--ink);color:var(--paper);border-radius:6px;padding:20px 24px;margin-bottom:14px;border:2px solid var(--ink);}
.plan-age-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:10px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;margin-bottom:10px;}
.plan-age-badge.y13{background:var(--y13);color:var(--paper);}
.plan-age-badge.y46{background:var(--y46);color:var(--paper);}
.plan-title{font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(22px,4vw,32px);letter-spacing:.02em;text-transform:uppercase;line-height:1;margin-bottom:10px;}
.plan-meta-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
@media(max-width:700px){.plan-meta-grid{grid-template-columns:1fr 1fr;}}
.plan-meta-item .label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:2px;}
.plan-meta-item .value{font-size:14px;font-weight:600;}
.plan-objectives{margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,.15);}
.plan-objectives .label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:6px;}
.plan-objectives ul{list-style:none;padding:0;}
.plan-objectives li{font-size:13px;padding-left:14px;position:relative;margin-bottom:3px;}
.plan-objectives li::before{content:"–";position:absolute;left:0;opacity:.6;}

.plan-actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.action-btn{font-family:'Oswald',sans-serif;font-weight:600;font-size:13px;letter-spacing:.06em;text-transform:uppercase;padding:10px 20px;border:2px solid var(--ink);border-radius:6px;cursor:pointer;transition:all .12s;}
.action-btn.primary{background:var(--gym);color:var(--paper);}
.action-btn.secondary{background:var(--paper);color:var(--ink);}
.action-btn.danger{background:var(--paper);color:var(--danger);border-color:var(--danger);}
.action-btn:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 var(--ink);}

/* TIME BLOCK */
.time-block{background:var(--paper);border:1.5px solid var(--ink);border-radius:6px;margin-bottom:12px;overflow:hidden;}
.time-block-header{padding:11px 16px;display:flex;align-items:center;gap:10px;background:var(--ink);color:var(--paper);}
.time-block-time{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;background:rgba(255,255,255,.12);padding:3px 9px;border-radius:10px;flex-shrink:0;}
.time-block-title{font-family:'Oswald',sans-serif;font-weight:700;font-size:15px;letter-spacing:.05em;text-transform:uppercase;flex:1;}
.time-block-body{padding:16px 18px;}
.editable-text{width:100%;border:1px solid transparent;border-radius:4px;padding:4px 6px;font-family:'Manrope',sans-serif;font-size:14px;color:var(--ink);background:transparent;resize:vertical;min-height:1.4em;transition:border-color .12s,background .12s;}
.editable-text:hover{background:var(--bg);}
.editable-text:focus{outline:none;border-color:var(--gym);background:var(--bg);}
.field-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;display:block;}

/* STATIONS GRID */
.stations-grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));}
.station-card{border:1.5px solid var(--rule);border-radius:6px;overflow:hidden;background:var(--bg);}
.station-card-head{padding:9px 13px;display:flex;align-items:center;gap:8px;}
.station-card-head.technical{background:var(--gym-soft);}
.station-card-head.independent{background:var(--y46-soft);}
.station-card-head.apparatus{background:#FFF3CD;}
.station-card-head.extension{background:var(--extend-soft);}
.station-type-tag{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;}
.station-card-body{padding:12px 13px;display:flex;flex-direction:column;gap:8px;}
.station-source-badge{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.08em;text-transform:uppercase;padding:2px 6px;border-radius:6px;background:var(--ink);color:var(--paper);opacity:.55;margin-left:auto;}

.subfield-row{display:flex;flex-direction:column;gap:3px;}
.diff-strip{display:flex;flex-direction:column;gap:6px;margin-top:4px;}
.diff-pill{border-radius:4px;padding:6px 8px;font-size:12.5px;}
.diff-pill.support{background:var(--support-soft);border-left:3px solid var(--support);}
.diff-pill.core{background:var(--core-soft);border-left:3px solid var(--core);}
.diff-pill.extension{background:var(--extend-soft);border-left:3px solid var(--extend);}
.diff-pill .diff-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;display:block;margin-bottom:2px;}
.diff-pill.support .diff-label{color:var(--support);}
.diff-pill.core .diff-label{color:#145470;}
.diff-pill.extension .diff-label{color:var(--extend);}

.safety-note{background:var(--support-soft);border:1px solid var(--support);border-radius:4px;padding:6px 9px;font-size:12px;color:#7A0E22;margin-top:4px;}
.safety-note::before{content:"⚠ ";}

.add-content-btn{display:flex;align-items:center;justify-content:center;gap:5px;padding:7px 10px;border:1.5px dashed var(--rule);border-radius:4px;background:transparent;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;width:100%;transition:all .12s;}
.add-content-btn:hover{border-color:var(--gym);color:var(--gym);}
.remove-station-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;margin-left:auto;padding:0 2px;}
.remove-station-btn:hover{color:var(--danger);}

.reflection-list{list-style:none;}
.reflection-list li{padding:6px 0;border-bottom:1px dashed var(--rule);font-size:13.5px;}
.reflection-list li:last-child{border-bottom:none;}

/* CONTENT PICKER */
.content-picker{position:fixed;inset:0;background:rgba(21,25,30,.5);display:none;align-items:center;justify-content:center;z-index:60;padding:20px;}
.content-picker.visible{display:flex;}
.content-picker-panel{background:var(--paper);border:2px solid var(--ink);border-radius:8px;max-width:560px;width:100%;max-height:80vh;display:flex;flex-direction:column;overflow:hidden;}
.content-picker-header{padding:14px 18px;border-bottom:1.5px solid var(--rule);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.content-picker-title{font-family:'Oswald',sans-serif;font-weight:700;font-size:15px;letter-spacing:.06em;text-transform:uppercase;}
.content-picker-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted);}
.content-picker-search{margin:12px 18px 8px;background:var(--bg);border:1.5px solid var(--rule);border-radius:4px;padding:7px 10px;font-family:'Manrope',sans-serif;font-size:13px;outline:none;}
.content-picker-search:focus{border-color:var(--gym);}
.content-picker-list{overflow-y:auto;padding:0 18px 14px;flex:1;}
.picker-item{padding:9px 10px;border-radius:4px;cursor:pointer;border:1px solid transparent;margin-bottom:3px;}
.picker-item:hover{background:var(--bg);border-color:var(--rule);}
.picker-item-name{font-weight:700;font-size:13.5px;}
.picker-item-meta{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-top:2px;}

.footer{margin-top:18px;padding:14px 18px;background:var(--ink);color:rgba(255,255,255,.6);border-radius:6px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;flex-wrap:wrap;gap:8px;}
.footer .accent{color:var(--accent);}
.footer a{color:rgba(255,255,255,.6);text-decoration:none;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--paper);padding:10px 20px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.06em;opacity:0;pointer-events:none;transition:all .2s;z-index:50;max-width:90vw;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media print {
  body{padding:0;background:white;font-size:12.5px;}
  .board{max-width:100%;}
  .crumb,.tabs,.builder-card,.plan-actions,.footer,.content-picker,.add-content-btn,.remove-station-btn,.head-link{display:none!important;}
  #plan-output{display:block!important;}
  .page-head{display:none;}
  .plan-header{background:white!important;color:black!important;border:2px solid black;-webkit-print-color-adjust:exact;}
  .time-block-header{background:#eee!important;color:black!important;-webkit-print-color-adjust:exact;}
  .editable-text{border:none;}
  @page{size:A4 landscape;margin:10mm;}
}
</style>
</head>
<body>
<div class="board">

  <div class="crumb">
    <a href="../../">Coach Tools</a>
    <span class="sep">/</span>
    <a href="../">Gymnastics</a>
    <span class="sep">/</span>
    <span>Session Builder</span>
  </div>

  <div class="page-head">
    <div class="page-head-inner">
      <h1>Session <span class="accent">Builder</span></h1>
      <div class="meta">After-school club · 45-minute structure · stations &amp; differentiation</div>
    </div>
    <div style="position:relative;z-index:1;display:flex;gap:8px;flex-wrap:wrap;">
      <a class="head-link" href="syllabus/">Syllabus →</a>
      <a class="head-link" href="library/">Arrival &amp; Game Library →</a>
      <a class="head-link" href="activities/">Manage custom activities →</a>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="new">New session</button>
    <button class="tab-btn" data-tab="saved">Saved sessions</button>
  </div>

  <!-- ════════════════ NEW SESSION TAB ════════════════ -->
  <div id="tab-new">
    <div class="builder-card" id="builderCard">
      <div class="section-label">Session setup</div>

      <div class="form-row">
        <div class="form-group" style="flex:0 0 auto;">
          <label>Age group</label>
          <div class="age-toggle" id="ageToggle">
            <button class="age-btn active y13" data-age="y1-3">Years 1–3</button>
            <button class="age-btn y46" data-age="y4-6">Years 4–6</button>
          </div>
        </div>
        <div class="form-group" style="flex:0 0 200px;">
          <label>Week / theme</label>
          <select id="weekSelect"></select>
        </div>
        <div class="form-group" style="flex:0 0 160px;">
          <label>Date</label>
          <input type="date" id="dateInput">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Notes for the generator (optional)</label>
          <input type="text" id="notesInput" placeholder="e.g. Focus on cartwheel entry, three Year 6 helpers available, no springboard this week…">
        </div>
      </div>

      <button class="build-btn" id="buildBtn"><span class="spinner"></span><span class="build-label">⬡ Generate session draft</span></button>
    </div>
  </div>

  <!-- ════════════════ SAVED SESSIONS TAB ════════════════ -->
  <div id="tab-saved" style="display:none;">
    <div class="saved-list" id="savedList"></div>
  </div>

  <!-- ════════════════ PLAN OUTPUT ════════════════ -->
  <div id="plan-output">

    <div class="plan-header" id="planHeader"></div>

    <div class="plan-actions">
      <button class="action-btn primary" id="saveSessionBtn">💾 Save session</button>
      <button class="action-btn secondary" onclick="window.print()">⎙ Print / Save PDF</button>
      <button class="action-btn secondary" id="backToSetupBtn">← Back to setup</button>
      <button class="action-btn danger" id="discardBtn" style="display:none;">Delete saved session</button>
    </div>

    <div id="planBody"></div>

  </div>

  <footer class="footer">
    <span><span class="accent">●</span> <a href="../../">Coach Tools</a></span>
    <span>Gymnastics · After-School Club Session Builder</span>
    <span>v2.0</span>
  </footer>

</div><!-- /board -->

<!-- CONTENT PICKER (swap/add activity within a station) -->
<div class="content-picker" id="contentPicker">
  <div class="content-picker-panel">
    <div class="content-picker-header">
      <span class="content-picker-title" id="pickerTitle">Choose activity</span>
      <button class="content-picker-close" id="pickerClose">✕</button>
    </div>
    <input class="content-picker-search" id="pickerSearch" type="text" placeholder="Search RISE cards &amp; custom activities…">
    <div class="content-picker-list" id="pickerList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════
   STORAGE ABSTRACTION
   Today: localStorage. Later: swap bodies for Supabase calls.
═══════════════════════════════════════════════ */
const LS_ACTIVITIES = 'coachtools_gym_custom_activities_v1';
const LS_SESSIONS = 'coachtools_gym_saved_sessions_v1';

async function loadCustomActivities() {
  const cached = localStorage.getItem(LS_ACTIVITIES);
  if (cached) { try { return JSON.parse(cached); } catch(e) {} }
  try {
    const data = await fetch('data/custom-activities.json').then(r => r.json());
    const seeded = data.activities || [];
    localStorage.setItem(LS_ACTIVITIES, JSON.stringify(seeded));
    return seeded;
  } catch(e) { return []; }
}
function loadSavedSessions() {
  const cached = localStorage.getItem(LS_SESSIONS);
  if (cached) { try { return JSON.parse(cached); } catch(e) {} }
  return [];
}
function persistSavedSessions(list) {
  localStorage.setItem(LS_SESSIONS, JSON.stringify(list));
}

/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
let syllabus = null;
let riseActivities = {}; // packId -> {pack, cards}
let customActivities = [];
let savedSessions = [];
let currentAge = 'y1-3';
let plan = null;          // the live editable session object
let editingSavedId = null; // if editing a saved session, its id
let pickerTarget = null;   // { sectionPath, mode: 'station-add'|'station-swap', stationIdx }

const RISE_FILES = {
  locomotion: 'activity-cards/data/locomotion.json',
  balance: 'activity-cards/data/balance.json',
  rotation: 'activity-cards/data/rotation.json',
  spring: 'activity-cards/data/spring.json'
};

/* ═══════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════ */
async function init() {
  document.getElementById('dateInput').value = new Date().toISOString().slice(0,10);

  try {
    syllabus = await fetch('data/syllabus.json').then(r => r.json());
  } catch(e) {
    console.error('Failed to load syllabus.json', e);
    showToast('Could not load syllabus data — check data/syllabus.json is deployed.');
  }

  await Promise.all(Object.entries(RISE_FILES).map(async ([id, path]) => {
    try {
      const data = await fetch('../' + path).then(r => r.json());
      riseActivities[id] = data;
    } catch(e) {
      console.warn(`Could not load RISE pack "${id}" from ${path}`, e);
    }
  }));

  customActivities = await loadCustomActivities();
  savedSessions = loadSavedSessions();

  populateWeekSelect();
  renderSavedList();

  // Tabs
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-new').style.display = btn.dataset.tab === 'new' ? 'block' : 'none';
      document.getElementById('tab-saved').style.display = btn.dataset.tab === 'saved' ? 'block' : 'none';
      document.getElementById('plan-output').style.display = 'none';
      document.getElementById('builderCard').style.display = 'block';
    });
  });

  // Age toggle
  document.getElementById('ageToggle').querySelectorAll('.age-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.age-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentAge = btn.dataset.age;
    });
  });

  document.getElementById('buildBtn').addEventListener('click', generateDraft);
  document.getElementById('backToSetupBtn').addEventListener('click', () => {
    document.getElementById('plan-output').style.display = 'none';
    document.getElementById('builderCard').style.display = 'block';
  });
  document.getElementById('saveSessionBtn').addEventListener('click', saveCurrentSession);
  document.getElementById('discardBtn').addEventListener('click', deleteSavedSession);
  document.getElementById('pickerClose').addEventListener('click', closePicker);
  document.getElementById('pickerSearch').addEventListener('input', renderPickerList);
}

function populateWeekSelect() {
  const sel = document.getElementById('weekSelect');
  if (!syllabus) return;
  sel.innerHTML = syllabus.weeks.map((w,i) =>
    `<option value="${i}">Wk ${w.weekRange} · ${w.theme}</option>`
  ).join('');
}

/* ═══════════════════════════════════════════════
   CONTENT POOL (RISE cards + custom activities)
   Unified shape so both are interchangeable.
═══════════════════════════════════════════════ */
function getContentPool() {
  const pool = [];
  Object.entries(riseActivities).forEach(([packId, data]) => {
    (data.cards || []).forEach(c => {
      pool.push({
        id: `rise-${packId}-${c.id}`,
        name: c.name,
        tagline: c.tagline,
        description: c.description,
        source: 'rise',
        pack: packId,
        activityType: c.activityType || [],
        equipment: c.equipment,
        awardSkills: c.awardSkills || [],
        adaptIt: c.adaptIt || null
      });
    });
  });
  customActivities.forEach(a => {
    pool.push({
      id: `custom-${a.id}`,
      name: a.name,
      tagline: a.tagline,
      description: a.description,
      source: 'custom',
      stationType: a.stationType,
      themeTags: a.themeTags || [],
      ageGroups: a.ageGroups || [],
      limitingFactor: a.limitingFactor,
      equipment: a.equipment,
      differentiation: a.differentiation || null,
      coachingPoints: a.coachingPoints || [],
      safetyPoints: a.safetyPoints || []
    });
  });
  return pool;
}

/* ═══════════════════════════════════════════════
   AI DRAFT GENERATION
═══════════════════════════════════════════════ */
const SYSTEM_PROMPT = `You are an expert primary school gymnastics coach designing sessions for a UK after-school gymnastics club.

CLUB CONTEXT: Mixed-ability sessions, two age groups (Years 1-3 and Years 4-6, Y4-6 may include high performers), one coach sometimes assisted by Year 6 helpers, 45 minutes of active coaching time, children arrive/leave at slightly different times. Maximise activity, minimise queues and behaviour problems.

COACHING PHILOSOPHY: Every child experiences success. Children spend most of the session moving. Avoid long queues and lengthy explanations. Use stations and challenges for mixed ability. Differentiate by progression and support, not by separating children by ability — everyone works on the same theme at different challenge levels. Use a constraints-led approach where possible. Skills progress exploration → technique → application → performance. No child waits long. Maximum uninterrupted activity block is 3-5 minutes before a coaching intervention, progression, challenge, or change.

SAFETY: Avoid or heavily restrict: headstands bearing significant bodyweight through the neck, neck bridges, forced flexibility, oversplits, prolonged static holds, repetitive lumbar hyperextension, excessive continuous support work on hands. Permitted: rolls, cartwheels, balances, bridges (limited volume, pain-free), jumping and landing, low-level apparatus work. Crab walks/wheelbarrows/prolonged hand support must be short.

SESSION STRUCTURE (45 min):
0-5 Arrival Challenge — self-directed, minimal explanation, joinable on arrival, instantly stoppable.
5-10 Whole Group Warm-Up — dynamic: locomotion, shapes, balances, jumping/landing.
10-25 Main Learning Block — stations (max 3 for Y1-3, max 4 for Y4-6). Station types: teacher technical, independent, apparatus, extension/challenge. Each station needs: objective, organisation, progressions, support/regression, coaching points, safety points.
25-35 Apparatus Challenge — at least one apparatus every session, linked to the theme.
35-42 Team Challenge Game — fun application game linked to theme.
42-45 Reflection/Showcase/Tidy — demonstration, self-assessment or peer feedback.

DIFFERENTIATION MODEL for every skill: identify the performance problem, identify the likely limiting factor (mobility/strength/coordination/balance/power/confidence/understanding), then give Support activities (can't yet perform it), Core activities (most children), Extension activities (already can perform it).

You will be given: the age group, the week's theme and apparatus, a content pool of available activities (RISE Award Scheme activity cards and custom coach-authored activities) to draw from preferentially, and any coach notes. Prefer activities from the supplied pool where they fit; invent additional brief activities only where the pool doesn't cover a need (e.g. a specific arrival challenge or team game), drawing on the supplied libraries of arrival challenges and team games.

Respond with ONLY valid JSON (no markdown fences, no prose) matching exactly this shape:
{
  "theme": string,
  "ageGroup": "y1-3" | "y4-6",
  "learningObjectives": [string, ...],
  "arrivalChallenge": { "name": string, "description": string },
  "warmUp": { "description": string },
  "stations": [
    {
      "type": "technical" | "independent" | "apparatus" | "extension",
      "name": string,
      "objective": string,
      "organisation": string,
      "contentRef": string | null,   // id from the supplied content pool if one was used, else null
      "progressions": [string, ...],
      "differentiation": { "support": [string,...], "core": [string,...], "extension": [string,...] },
      "coachingPoints": [string, ...],
      "safetyPoints": [string, ...]
    }
  ],
  "apparatusChallenge": { "apparatus": string, "description": string, "safetyPoints": [string,...] },
  "teamChallengeGame": { "name": string, "description": string },
  "reflectionQuestions": [string, ...]
}
Station count must match the age group maximum (3 for y1-3, 4 for y4-6). Keep all text concise and practical — this is read by a coach mid-session, not a planning document for review.`;

async function generateDraft() {
  const btn = document.getElementById('buildBtn');
  btn.disabled = true;
  btn.classList.add('loading');

  const weekIdx = parseInt(document.getElementById('weekSelect').value || 0);
  const week = syllabus.weeks[weekIdx];
  const ageLabel = currentAge === 'y1-3' ? 'Years 1-3' : 'Years 4-6';
  const maxStations = syllabus.ageGroups.find(a => a.id === currentAge).maxStations;
  const notes = document.getElementById('notesInput').value.trim();
  const pool = getContentPool();

  const userPrompt = `Age group: ${ageLabel} (${currentAge}), max stations: ${maxStations}
Week: ${week.weekRange} — Theme: "${week.theme}" — Suggested apparatus: ${week.apparatus}
Suggested award skills for this theme: ${(week.suggestedAwardSkills||[]).join(', ') || 'none specified'}
Arrival challenge library: ${syllabus.arrivalChallengeLibrary.join(', ')}
Theme-specific arrival ideas: ${(syllabus.arrivalChallengesByTheme[week.themeTag]||[]).join(', ') || 'none specific — pick from the general library'}
Team challenge game library: ${syllabus.teamChallengeGameLibrary.join(', ')}
Coach notes: ${notes || 'none'}

Available content pool (prefer these where they fit; reference by "id"):
${JSON.stringify(pool.map(p => ({id:p.id, name:p.name, tagline:p.tagline, source:p.source, stationType:p.stationType||null, themeTags:p.themeTags||null, ageGroups:p.ageGroups||null})), null, 0)}`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 4000,
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: userPrompt }]
      })
    });
    const data = await response.json();
    let text = (data.content?.[0]?.text || '').trim();
    text = text.replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/```\s*$/,'');
    const draft = JSON.parse(text);

    plan = {
      id: 'session-' + Date.now().toString(36),
      createdAt: new Date().toISOString(),
      savedAt: null,
      date: document.getElementById('dateInput').value,
      weekRange: week.weekRange,
      apparatus: week.apparatus,
      notes,
      ...draft
    };
    editingSavedId = null;
    renderPlan();
  } catch(e) {
    console.error('Generation failed', e);
    showToast('Draft generation failed: ' + e.message + '. You can try again, or check the console for details.');
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
  }
}

/* ═══════════════════════════════════════════════
   RENDER PLAN
═══════════════════════════════════════════════ */
const STATION_LABEL = { technical:'Teacher technical', independent:'Independent', apparatus:'Apparatus', extension:'Extension / challenge' };

function renderPlan() {
  document.getElementById('builderCard').style.display = 'none';
  document.getElementById('plan-output').style.display = 'block';

  const ageBadgeClass = plan.ageGroup === 'y1-3' ? 'y13' : 'y46';
  const ageLabel = plan.ageGroup === 'y1-3' ? 'Years 1–3' : 'Years 4–6';

  document.getElementById('planHeader').innerHTML = `
    <span class="plan-age-badge ${ageBadgeClass}">${ageLabel}</span>
    <div class="plan-title">${escapeHtml(plan.theme)}</div>
    <div class="plan-meta-grid">
      <div class="plan-meta-item"><div class="label">Week</div><div class="value">${escapeHtml(plan.weekRange||'—')}</div></div>
      <div class="plan-meta-item"><div class="label">Apparatus</div><div class="value">${escapeHtml(plan.apparatus||'—')}</div></div>
      <div class="plan-meta-item"><div class="label">Date</div><div class="value">${escapeHtml(plan.date||'—')}</div></div>
      <div class="plan-meta-item"><div class="label">Stations</div><div class="value">${plan.stations.length}</div></div>
    </div>
    <div class="plan-objectives">
      <div class="label">Learning objectives</div>
      <ul>${(plan.learningObjectives||[]).map(o => `<li>${escapeHtml(o)}</li>`).join('')}</ul>
    </div>
  `;

  document.getElementById('discardBtn').style.display = editingSavedId ? 'inline-block' : 'none';
  renderPlanBody();
}

function renderPlanBody() {
  const body = document.getElementById('planBody');
  body.innerHTML = '';
  body.appendChild(buildArrivalBlock());
  body.appendChild(buildWarmUpBlock());
  body.appendChild(buildStationsBlock());
  body.appendChild(buildApparatusBlock());
  body.appendChild(buildTeamGameBlock());
  body.appendChild(buildReflectionBlock());
}

function timeBlockShell(time, title) {
  const el = document.createElement('div');
  el.className = 'time-block';
  el.innerHTML = `<div class="time-block-header"><span class="time-block-time">${time}</span><span class="time-block-title">${title}</span></div><div class="time-block-body"></div>`;
  return el;
}

function editableField(value, onChange, multiline) {
  const el = document.createElement(multiline ? 'textarea' : 'input');
  if (!multiline) el.type = 'text';
  el.className = 'editable-text';
  el.value = value || '';
  el.addEventListener('input', () => onChange(el.value));
  if (multiline) {
    el.style.height = 'auto';
    const grow = () => { el.style.height='auto'; el.style.height = el.scrollHeight + 'px'; };
    el.addEventListener('input', grow);
    setTimeout(grow, 0);
  }
  return el;
}

function labeledField(labelText, value, onChange, multiline) {
  const wrap = document.createElement('div');
  wrap.className = 'subfield-row';
  const lbl = document.createElement('span');
  lbl.className = 'field-label';
  lbl.textContent = labelText;
  wrap.appendChild(lbl);
  wrap.appendChild(editableField(value, onChange, multiline));
  return wrap;
}

function buildArrivalBlock() {
  const block = timeBlockShell('0–5 MIN', 'Arrival Challenge');
  const b = block.querySelector('.time-block-body');
  b.appendChild(labeledField('Name', plan.arrivalChallenge?.name, v => plan.arrivalChallenge.name = v));
  b.appendChild(labeledField('Description', plan.arrivalChallenge?.description, v => plan.arrivalChallenge.description = v, true));
  return block;
}

function buildWarmUpBlock() {
  const block = timeBlockShell('5–10 MIN', 'Whole Group Warm-Up');
  const b = block.querySelector('.time-block-body');
  b.appendChild(labeledField('Description', plan.warmUp?.description, v => plan.warmUp.description = v, true));
  return block;
}

function buildStationsBlock() {
  const block = timeBlockShell('10–25 MIN', 'Main Learning Block');
  const b = block.querySelector('.time-block-body');
  const grid = document.createElement('div');
  grid.className = 'stations-grid';

  plan.stations.forEach((st, idx) => grid.appendChild(buildStationCard(st, idx)));
  b.appendChild(grid);

  const maxStations = syllabus.ageGroups.find(a => a.id === plan.ageGroup).maxStations;
  if (plan.stations.length < maxStations) {
    const addBtn = document.createElement('button');
    addBtn.className = 'add-content-btn';
    addBtn.style.marginTop = '10px';
    addBtn.textContent = '+ Add station';
    addBtn.addEventListener('click', () => {
      plan.stations.push({ type:'independent', name:'New station', objective:'', organisation:'', contentRef:null, progressions:[], differentiation:{support:[],core:[],extension:[]}, coachingPoints:[], safetyPoints:[] });
      renderPlanBody();
    });
    b.appendChild(addBtn);
  }
  return block;
}

function buildStationCard(st, idx) {
  const card = document.createElement('div');
  card.className = 'station-card';

  const head = document.createElement('div');
  head.className = `station-card-head ${st.type}`;
  const typeTag = document.createElement('span');
  typeTag.className = 'station-type-tag';
  typeTag.textContent = STATION_LABEL[st.type] || st.type;
  head.appendChild(typeTag);
  if (st.contentRef) {
    const srcBadge = document.createElement('span');
    srcBadge.className = 'station-source-badge';
    srcBadge.textContent = st.contentRef.startsWith('rise-') ? 'RISE' : 'CUSTOM';
    head.appendChild(srcBadge);
  }
  const rm = document.createElement('button');
  rm.className = 'remove-station-btn';
  rm.textContent = '✕';
  rm.title = 'Remove station';
  rm.style.marginLeft = st.contentRef ? '6px' : 'auto';
  rm.addEventListener('click', () => { plan.stations.splice(idx,1); renderPlanBody(); });
  head.appendChild(rm);
  card.appendChild(head);

  const bodyEl = document.createElement('div');
  bodyEl.className = 'station-card-body';

  bodyEl.appendChild(labeledField('Station name', st.name, v => st.name = v));
  bodyEl.appendChild(labeledField('Objective', st.objective, v => st.objective = v, true));
  bodyEl.appendChild(labeledField('Organisation', st.organisation, v => st.organisation = v, true));

  if ((st.progressions||[]).length) {
    bodyEl.appendChild(labeledField('Progressions', st.progressions.join(' → '), v => st.progressions = v.split('→').map(s=>s.trim()).filter(Boolean), true));
  }

  const diffStrip = document.createElement('div');
  diffStrip.className = 'diff-strip';
  ['support','core','extension'].forEach(tier => {
    const pill = document.createElement('div');
    pill.className = `diff-pill ${tier}`;
    const lbl = document.createElement('span');
    lbl.className = 'diff-label';
    lbl.textContent = tier;
    pill.appendChild(lbl);
    const txt = editableField((st.differentiation?.[tier]||[]).join(' · '), v => {
      st.differentiation = st.differentiation || {};
      st.differentiation[tier] = v.split('·').map(s=>s.trim()).filter(Boolean);
    }, true);
    pill.appendChild(txt);
    diffStrip.appendChild(pill);
  });
  bodyEl.appendChild(diffStrip);

  bodyEl.appendChild(labeledField('Coaching points', (st.coachingPoints||[]).join(' · '), v => st.coachingPoints = v.split('·').map(s=>s.trim()).filter(Boolean), true));

  if ((st.safetyPoints||[]).length) {
    const safety = document.createElement('div');
    safety.className = 'safety-note';
    safety.textContent = st.safetyPoints.join(' · ');
    bodyEl.appendChild(safety);
  }

  const swapBtn = document.createElement('button');
  swapBtn.className = 'add-content-btn';
  swapBtn.textContent = '⇄ Swap activity from library';
  swapBtn.addEventListener('click', () => openPicker(idx));
  bodyEl.appendChild(swapBtn);

  card.appendChild(bodyEl);
  return card;
}

function buildApparatusBlock() {
  const block = timeBlockShell('25–35 MIN', 'Apparatus Challenge');
  const b = block.querySelector('.time-block-body');
  b.appendChild(labeledField('Apparatus', plan.apparatusChallenge?.apparatus, v => plan.apparatusChallenge.apparatus = v));
  b.appendChild(labeledField('Description', plan.apparatusChallenge?.description, v => plan.apparatusChallenge.description = v, true));
  if ((plan.apparatusChallenge?.safetyPoints||[]).length) {
    const safety = document.createElement('div');
    safety.className = 'safety-note';
    safety.textContent = plan.apparatusChallenge.safetyPoints.join(' · ');
    b.appendChild(safety);
  }
  return block;
}

function buildTeamGameBlock() {
  const block = timeBlockShell('35–42 MIN', 'Team Challenge Game');
  const b = block.querySelector('.time-block-body');
  b.appendChild(labeledField('Name', plan.teamChallengeGame?.name, v => plan.teamChallengeGame.name = v));
  b.appendChild(labeledField('Description', plan.teamChallengeGame?.description, v => plan.teamChallengeGame.description = v, true));
  return block;
}

function buildReflectionBlock() {
  const block = timeBlockShell('42–45 MIN', 'Reflection / Showcase / Tidy');
  const b = block.querySelector('.time-block-body');
  const ul = document.createElement('ul');
  ul.className = 'reflection-list';
  (plan.reflectionQuestions||[]).forEach((q, i) => {
    const li = document.createElement('li');
    li.appendChild(editableField(q, v => plan.reflectionQuestions[i] = v));
    ul.appendChild(li);
  });
  b.appendChild(ul);
  return block;
}

/* ═══════════════════════════════════════════════
   CONTENT PICKER (swap a station's activity)
═══════════════════════════════════════════════ */
function openPicker(stationIdx) {
  pickerTarget = { stationIdx };
  document.getElementById('pickerTitle').textContent = `Swap → ${plan.stations[stationIdx].name || 'station'}`;
  document.getElementById('pickerSearch').value = '';
  document.getElementById('contentPicker').classList.add('visible');
  renderPickerList();
  document.getElementById('pickerSearch').focus();
}
function closePicker() {
  document.getElementById('contentPicker').classList.remove('visible');
  pickerTarget = null;
}
function renderPickerList() {
  const q = document.getElementById('pickerSearch').value.toLowerCase();
  const pool = getContentPool().filter(p => !q || p.name.toLowerCase().includes(q) || (p.tagline||'').toLowerCase().includes(q));
  const list = document.getElementById('pickerList');
  if (!pool.length) {
    list.innerHTML = '<div style="padding:14px;color:var(--muted);font-size:13px;">No matches.</div>';
    return;
  }
  list.innerHTML = pool.map((p,i) => `
    <div class="picker-item" data-idx="${i}">
      <div class="picker-item-name">${escapeHtml(p.name)}</div>
      <div class="picker-item-meta">${p.source === 'rise' ? 'RISE · ' + p.pack : 'Custom'}${p.tagline ? ' · ' + escapeHtml(p.tagline) : ''}</div>
    </div>
  `).join('');
  list.querySelectorAll('.picker-item').forEach((el,i) => {
    el.addEventListener('click', () => applyPick(pool[i]));
  });
}
function applyPick(item) {
  if (!pickerTarget) return;
  const st = plan.stations[pickerTarget.stationIdx];
  st.name = item.name;
  st.objective = item.tagline || st.objective;
  st.organisation = item.description || st.organisation;
  st.contentRef = item.id;
  if (item.differentiation) st.differentiation = item.differentiation;
  if (item.coachingPoints) st.coachingPoints = item.coachingPoints;
  if (item.safetyPoints) st.safetyPoints = item.safetyPoints;
  closePicker();
  renderPlanBody();
}

/* ═══════════════════════════════════════════════
   SAVE / LOAD SESSIONS
═══════════════════════════════════════════════ */
function saveCurrentSession() {
  if (!plan) return;
  plan.savedAt = new Date().toISOString();
  const idx = savedSessions.findIndex(s => s.id === plan.id);
  if (idx >= 0) savedSessions[idx] = plan; else savedSessions.push(plan);
  persistSavedSessions(savedSessions);
  editingSavedId = plan.id;
  document.getElementById('discardBtn').style.display = 'inline-block';
  showToast('Session saved');
  renderSavedList();
}

function deleteSavedSession() {
  if (!editingSavedId) return;
  if (!confirm('Delete this saved session? This cannot be undone.')) return;
  savedSessions = savedSessions.filter(s => s.id !== editingSavedId);
  persistSavedSessions(savedSessions);
  editingSavedId = null;
  plan = null;
  document.getElementById('plan-output').style.display = 'none';
  document.getElementById('builderCard').style.display = 'block';
  renderSavedList();
  showToast('Session deleted');
}

function renderSavedList() {
  const wrap = document.getElementById('savedList');
  if (!savedSessions.length) {
    wrap.innerHTML = '<div class="empty-state">No saved sessions yet. Generate a draft, edit it, then tap <strong>Save session</strong>.</div>';
    return;
  }
  const sorted = [...savedSessions].sort((a,b) => new Date(b.savedAt||b.createdAt) - new Date(a.savedAt||a.createdAt));
  wrap.innerHTML = sorted.map(s => `
    <div class="saved-row" data-id="${s.id}">
      <span class="plan-age-badge ${s.ageGroup === 'y1-3' ? 'y13' : 'y46'}" style="margin:0;">${s.ageGroup === 'y1-3' ? 'Y1–3' : 'Y4–6'}</span>
      <div class="saved-row-main">
        <div class="saved-row-name">${escapeHtml(s.theme||'Untitled session')}</div>
        <div class="saved-row-meta">Week ${escapeHtml(s.weekRange||'—')} · ${escapeHtml(s.date||'')}</div>
      </div>
    </div>
  `).join('');
  wrap.querySelectorAll('.saved-row').forEach(el => {
    el.addEventListener('click', () => {
      plan = savedSessions.find(s => s.id === el.dataset.id);
      editingSavedId = plan.id;
      renderPlan();
    });
  });
}

/* ═══════════════════════════════════════════════
   UTIL
═══════════════════════════════════════════════ */
function escapeHtml(s) { return (s||'').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 4000);
}

init();
</script>
