<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Warm Ups · Strength & Conditioning · Coach Tools</title>
<meta name="theme-color" content="#5BA3D9">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #F5F1E8;
    --paper: #FBF8F1;
    --ink: #15191E;
    --ink-soft: #3A4049;
    --muted: #6B7280;
    --rule: #DAD3C4;
    --primary: #C8102E;
    --secondary: #142850;
    --accent: #F2B705;
    --sc: #5BA3D9;
    --sc-deep: #1E5A8F;
    --sc-soft: #E1EFF8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg); color: var(--ink);
    font-family: 'Manrope', sans-serif; font-size: 15px; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  body { min-height: 100vh; padding: 24px 18px 60px; }
  .board { max-width: 980px; margin: 0 auto; }

  .crumb {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 14px;
  }
  .crumb a { color: var(--ink-soft); text-decoration: none; }
  .crumb a:hover { color: var(--primary); }
  .crumb .sep { margin: 0 8px; opacity: 0.5; }

  /* === LIBRARY HEADER === */
  .page-head {
    background: var(--paper); border: 1.5px solid var(--ink);
    border-radius: 6px; padding: 18px 22px; margin-bottom: 14px;
  }
  .page-head h1 {
    font-family: 'Oswald', sans-serif; font-weight: 700;
    font-size: clamp(28px, 6vw, 42px); letter-spacing: 0.03em;
    text-transform: uppercase; line-height: 1; margin-bottom: 6px;
  }
  .page-head .meta {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase;
  }

  /* === LIBRARY CARDS === */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }
  .wu-card {
    display: block; text-decoration: none; color: var(--ink);
    background: var(--paper); border: 1.5px solid var(--ink);
    border-radius: 6px; overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .wu-card:hover { transform: translate(-2px, -2px); box-shadow: 4px 4px 0 var(--ink); }
  .wu-card:active { transform: translate(0, 0); box-shadow: 2px 2px 0 var(--ink); }
  .wu-stripe { height: 8px; background: var(--sc); }
  .wu-body { padding: 14px 16px 16px; }
  .wu-tag {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted);
    margin-bottom: 5px;
    display: flex; gap: 8px; align-items: center;
  }
  .wu-tag .src {
    padding: 2px 6px; border-radius: 8px;
    color: var(--paper); background: var(--sc-deep);
    font-weight: 700;
  }
  .wu-name {
    font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 20px;
    letter-spacing: 0.03em; text-transform: uppercase; line-height: 1.05;
    margin-bottom: 6px;
  }
  .wu-summary {
    font-size: 13px; color: var(--ink-soft); line-height: 1.4;
    margin-bottom: 10px;
  }
  .wu-meta {
    display: flex; justify-content: space-between; align-items: center;
    padding-top: 10px; border-top: 1px solid var(--rule);
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted);
  }

  /* === DETAIL VIEW === */
  .hero {
    background: var(--ink); color: var(--paper);
    border-radius: 6px; padding: 22px 26px;
    position: relative; overflow: hidden;
    border: 2px solid var(--ink);
    display: flex; gap: 18px; align-items: center; flex-wrap: wrap;
  }
  .hero::before {
    content: ""; position: absolute; inset: 0;
    background: repeating-linear-gradient(135deg, rgba(91,163,217,0.06) 0 2px, transparent 2px 14px);
    pointer-events: none;
  }
  .hero-text { flex: 1; min-width: 200px; position: relative; z-index: 1; }
  .hero-top {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(255,255,255,0.5); margin-bottom: 4px;
  }
  .hero h1 {
    font-family: 'Oswald', sans-serif; font-weight: 700;
    font-size: clamp(28px, 6vw, 44px); letter-spacing: 0.02em;
    text-transform: uppercase; line-height: 0.95; margin-bottom: 6px;
  }
  .hero h1 .accent { color: var(--sc); }
  .hero-sub {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: rgba(255,255,255,0.65); letter-spacing: 0.08em;
    text-transform: uppercase;
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  }
  .chip {
    display: inline-block; padding: 3px 8px;
    border-radius: 10px; font-weight: 700; text-transform: uppercase;
  }
  .chip.src      { background: var(--sc); color: var(--paper); }
  .chip.duration { background: rgba(255,255,255,0.12); color: var(--paper); border: 1px solid rgba(255,255,255,0.25); }
  .chip.format   { background: var(--accent); color: var(--ink); }
  .print-btn {
    background: var(--paper); color: var(--ink); border: 2px solid var(--paper);
    width: 40px; height: 40px; border-radius: 6px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.12s; position: relative; z-index: 1;
  }
  .print-btn:hover { transform: translate(-1px, -1px); box-shadow: 2px 2px 0 var(--accent); }

  /* WHY CARD */
  .why-card {
    margin-top: 14px;
    background: var(--sc-deep); color: var(--paper);
    border: 2px solid var(--ink); border-radius: 6px;
    padding: 22px 24px; position: relative; overflow: hidden;
  }
  .why-card::before {
    content: ""; position: absolute; top: -20px; right: -20px;
    width: 80px; height: 80px; background: var(--accent);
    transform: rotate(45deg); opacity: 0.6;
  }
  .why-card .tag {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 8px;
    position: relative; z-index: 1;
  }
  .why-card .text {
    font-family: 'Oswald', sans-serif; font-weight: 600;
    font-size: clamp(18px, 2.5vw, 22px); line-height: 1.2;
    letter-spacing: 0.01em; position: relative; z-index: 1;
  }

  /* DIAGRAM */
  .diagram-card {
    margin-top: 14px; background: var(--paper);
    border: 1.5px solid var(--ink); border-radius: 6px;
    overflow: hidden;
  }
  .diagram-card svg { width: 100%; height: auto; display: block; }

  /* SECTION */
  .section {
    margin-top: 14px;
    background: var(--paper); border: 1.5px solid var(--ink);
    border-radius: 6px; padding: 18px 20px;
  }
  .section h2 {
    font-family: 'Oswald', sans-serif; font-weight: 700;
    font-size: 16px; letter-spacing: 0.14em; text-transform: uppercase;
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .section h2::before {
    content: ""; width: 8px; height: 8px; background: var(--sc); border-radius: 50%;
  }
  .section.science h2::before { background: var(--sc-deep); }

  .headline {
    font-size: 14px; color: var(--ink-soft); margin-bottom: 12px;
    font-style: italic;
  }

  .stations-list, .step-list { list-style: none; }
  .stations-list li {
    font-size: 14px; padding: 8px 10px;
    background: var(--sc-soft); border-left: 3px solid var(--sc);
    margin-bottom: 6px; border-radius: 0 4px 4px 0;
  }
  .step-list { counter-reset: scount; }
  .step-list li {
    counter-increment: scount; padding: 6px 0 6px 36px;
    position: relative; font-size: 14px; line-height: 1.5;
  }
  .step-list li::before {
    content: counter(scount, decimal-leading-zero);
    position: absolute; left: 0; top: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 700;
    color: var(--sc-deep); letter-spacing: 0.06em;
  }

  .phase {
    margin-bottom: 14px;
    padding: 12px 14px; background: var(--bg);
    border: 1px solid var(--rule); border-radius: 4px;
  }
  .phase .phase-label {
    font-family: 'Oswald', sans-serif; font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--sc-deep); margin-bottom: 6px; font-weight: 700;
  }
  .phase ul { list-style: none; display: flex; flex-wrap: wrap; gap: 6px; }
  .phase ul li {
    font-size: 13px; padding: 3px 9px;
    background: var(--paper); border: 1px solid var(--rule);
    border-radius: 12px;
  }

  .notes {
    margin-top: 10px; padding: 10px 12px;
    background: var(--bg); border-left: 3px solid var(--accent);
    border-radius: 0 4px 4px 0;
  }
  .notes ul { list-style: none; }
  .notes li {
    font-size: 13px; padding: 3px 0; padding-left: 18px;
    position: relative; color: var(--ink-soft);
  }
  .notes li::before {
    content: "▸"; position: absolute; left: 0;
    color: var(--sc-deep); font-weight: 700;
  }

  .science-text {
    font-size: 14px; line-height: 1.65; color: var(--ink-soft);
  }

  /* TAGS */
  .ref-tags {
    margin-top: 14px; padding: 14px 16px;
    background: var(--paper); border: 1.5px dashed var(--rule);
    border-radius: 6px;
  }
  .ref-tags .label {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink-soft); margin-bottom: 8px;
  }
  .ref-tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .ref-tag {
    font-size: 12px; padding: 4px 10px;
    background: var(--bg); border: 1px solid var(--ink);
    border-radius: 12px; color: var(--ink);
  }

  /* FOOTER */
  .footer {
    margin-top: 18px; padding: 14px 18px;
    background: var(--ink); color: rgba(255,255,255,0.6);
    border-radius: 6px;
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    flex-wrap: wrap; gap: 8px;
  }
  .footer .accent { color: var(--sc); }
  .footer a { color: rgba(255,255,255,0.6); text-decoration: none; }
  .footer a:hover { color: var(--accent); }

  @media print {
    body { padding: 0; background: white; }
    .crumb, .print-btn, .footer { display: none; }
    .hero { background: white; color: black; border: 2px solid black; }
    .hero::before { display: none; }
    .hero h1, .hero h1 .accent { color: black; }
    .hero-sub, .hero-top { color: #444; }
    .why-card { background: white; color: black; border: 2px solid black; }
    .why-card::before { display: none; }
    .why-card .tag { color: black; }
    .stations-list li { background: white; border-left: 3px solid #555; }
  }
</style>
</head>
<body>

<div class="board" id="board"></div>

<script>
const params = new URLSearchParams(location.search);
const detailId = params.get('id');

if (detailId) renderDetail(detailId);
else renderLibrary();

/* ====================== LIBRARY ====================== */
async function renderLibrary() {
  let manifest;
  try {
    manifest = await fetch('data/_manifest.json').then(r => r.json());
  } catch (e) {
    document.getElementById('board').innerHTML = '<p style="padding:20px">Error loading warm-ups.</p>';
    return;
  }
  const items = manifest.warmUps || [];

  document.getElementById('board').innerHTML = `
    <div class="crumb">
      <a href="../../">Coach Tools</a>
      <span class="sep">/</span>
      <a href="../">Strength &amp; Conditioning</a>
      <span class="sep">/</span>
      <span>Warm Ups</span>
    </div>

    <div class="page-head">
      <h1>Warm Ups</h1>
      <div class="meta">EEE · Gym-based · ${items.length} warm-up protocols · 8–12 min each</div>
    </div>

    <div class="grid">
      ${items.map(w => `
        <a class="wu-card" href="?id=${w.id}">
          <div class="wu-stripe"></div>
          <div class="wu-body">
            <div class="wu-tag">
              <span class="src">EEE</span>
              <span>${w.format}</span>
            </div>
            <div class="wu-name">${w.name}</div>
            <div class="wu-summary">${w.summary}</div>
            <div class="wu-meta">
              <span>${w.duration}</span>
              <span>${w.ready ? '✓ ready' : 'DRAFT'}</span>
            </div>
          </div>
        </a>
      `).join('')}
    </div>

    <footer class="footer">
      <span><span class="accent">●</span> <a href="../../">Coach Tools</a></span>
      <span>Strength &amp; Conditioning · Warm Ups</span>
      <span>v1.0</span>
    </footer>
  `;
}

/* ====================== DETAIL ====================== */
async function renderDetail(id) {
  let w;
  try {
    w = await fetch(`data/${id}.json`).then(r => {
      if (!r.ok) throw new Error('Not found');
      return r.json();
    });
    document.title = `${w.name} · Warm Ups · Coach Tools`;
  } catch (e) {
    document.getElementById('board').innerHTML = `<p style="padding:20px">Warm-up not found. <a href="./">Back to library</a></p>`;
    return;
  }

  const a = w.application || {};
  const stationsHtml = a.stations
    ? `<ul class="stations-list">${a.stations.map(s => `<li>${s}</li>`).join('')}</ul>`
    : '';
  const stepsHtml = a.steps
    ? `<ol class="step-list">${a.steps.map(s => `<li>${s}</li>`).join('')}</ol>`
    : '';
  const progressionsHtml = a.progressions
    ? a.progressions.map(p => `
        <div class="phase">
          <div class="phase-label">${p.phase}</div>
          <ul>${(p.items || []).map(i => `<li>${i}</li>`).join('')}</ul>
        </div>`).join('')
    : '';
  const notesHtml = a.notes && a.notes.length
    ? `<div class="notes"><ul>${a.notes.map(n => `<li>${n}</li>`).join('')}</ul></div>`
    : '';

  document.getElementById('board').innerHTML = `
    <div class="crumb">
      <a href="../../">Coach Tools</a>
      <span class="sep">/</span>
      <a href="../">Strength &amp; Conditioning</a>
      <span class="sep">/</span>
      <a href="./">Warm Ups</a>
      <span class="sep">/</span>
      <span>${w.name}</span>
    </div>

    <header class="hero">
      <div class="hero-text">
        <div class="hero-top">● Warm up · gym based</div>
        <h1>${highlightName(w.name)}</h1>
        <div class="hero-sub">
          <span class="chip src">EEE</span>
          <span class="chip format">${w.format}</span>
          <span class="chip duration">⏱ ${w.duration}</span>
        </div>
      </div>
      <button class="print-btn" onclick="window.print()" aria-label="Print">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 6 2 18 2 18 9"></polyline>
          <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
          <rect x="6" y="14" width="12" height="8"></rect>
        </svg>
      </button>
    </header>

    <div class="why-card">
      <div class="tag">▸ Why</div>
      <div class="text">${w.why}</div>
    </div>

    ${w.diagram ? `<div class="diagram-card">${getDiagram(w.diagram)}</div>` : ''}

    <section class="section">
      <h2>Application</h2>
      ${a.headline ? `<div class="headline">${a.headline}</div>` : ''}
      ${stationsHtml}
      ${progressionsHtml}
      ${stepsHtml}
      ${notesHtml}
    </section>

    <section class="section science">
      <h2>Science</h2>
      <div class="science-text">${w.science}</div>
    </section>

    ${w.tags && w.tags.length ? `
      <div class="ref-tags">
        <div class="label">▸ Reference tags · use these in your cue refs</div>
        <div class="ref-tag-list">
          ${w.tags.map(t => `<span class="ref-tag">${t}</span>`).join('')}
        </div>
      </div>
    ` : ''}

    <footer class="footer">
      <span><span class="accent">●</span> <a href="../../">Coach Tools</a></span>
      <span>${w.name} · S&amp;C warm-up</span>
      <span>v1.0</span>
    </footer>
  `;
}

/* ====================== SVG DIAGRAMS ====================== */

function scMovementPrepDiagram() {
  return `<svg viewBox="0 0 400 260" xmlns="http://www.w3.org/2000/svg">
    <rect width="400" height="260" fill="#E1EFF8"/>

    <!-- Flow arrows around circuit -->
    <g stroke="#C8102E" stroke-width="1.5" fill="none" stroke-dasharray="3 3">

function getDiagram(name) {
  switch (name) {
    case 'sc-movement-prep':     return scMovementPrepDiagram();
    case 'sc-coord-ladder':      return scCoordLadderDiagram();
    case 'sc-reactive':          return scReactiveDiagram();
    case 'sc-med-ball':          return scMedBallDiagram();
    case 'sc-movement-quality':  return scQualityDiagram();
    default:                     return scMovementPrepDiagram();
  }
}

function highlightName(name) {
  // Highlight the last word with the accent colour
  const words = name.split(' ');
  if (words.length === 1) return name;
  const last = words.pop();
  return `${words.join(' ')} <span class="accent">${last}</span>`;
}
