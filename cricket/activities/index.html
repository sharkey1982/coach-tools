<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cricket activities · Coach Tools</title>
<meta name="theme-color" content="#6B8E4E">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #F5F1E8;
    --paper: #FBF8F1;
    --ink: #15191E;
    --ink-soft: #3A4049;
    --muted: #6B7280;
    --rule: #DAD3C4;
    --primary: #C8102E;
    --secondary: #142850;
    --accent: #F2B705;
    --grass: #6B8E4E;
    --warm: #E2A33C;
    --football: #6B8E4E;
    --football-soft: #E0E8D6;
    --value: #6B3FA0;
    --value-soft: #EDE5F7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg); color: var(--ink);
    font-family: 'Manrope', sans-serif;
    font-size: 15px; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  body { min-height: 100vh; padding: 24px 18px 60px; }
  .board { max-width: 980px; margin: 0 auto; }

  /* shared crumb */
  .crumb {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 14px;
  }
  .crumb a { color: var(--ink-soft); text-decoration: none; }
  .crumb a:hover { color: var(--primary); }
  .crumb .sep { margin: 0 8px; opacity: 0.5; }

  /* ============== LIBRARY MODE ============== */
  .page-head {
    background: var(--paper);
    border: 1.5px solid var(--ink);
    border-radius: 6px; padding: 18px 22px;
    margin-bottom: 14px;
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 16px; flex-wrap: wrap;
  }
  .page-head-text { flex: 1; min-width: 200px; }
  .page-head h1 {
    font-family: 'Oswald', sans-serif; font-weight: 700;
    font-size: clamp(28px, 6vw, 42px);
    letter-spacing: 0.03em; text-transform: uppercase;
    line-height: 1; margin-bottom: 6px;
  }
  .page-head .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--muted);
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .filters {
    display: flex; flex-wrap: wrap; gap: 14px;
    background: var(--paper); border: 1.5px solid var(--ink);
    border-radius: 6px; padding: 14px 18px; margin-bottom: 14px;
  }
  .filter-group { display: flex; flex-direction: column; gap: 6px; }
  .filter-label {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted);
  }
  .pills { display: flex; gap: 5px; flex-wrap: wrap; }
  .pill {
    font-family: 'Manrope', sans-serif; font-size: 12px; font-weight: 600;
    padding: 5px 11px; border: 1.5px solid var(--ink);
    background: var(--paper); color: var(--ink);
    border-radius: 14px; cursor: pointer; transition: all 0.12s;
  }
  .pill:hover { background: rgba(0,0,0,0.04); }
  .pill.active { background: var(--ink); color: var(--paper); }

  .activity-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }
  .activity-card {
    display: block; text-decoration: none; color: var(--ink);
    background: var(--paper); border: 1.5px solid var(--ink);
    border-radius: 6px; overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
  }
  .activity-card:hover { transform: translate(-2px, -2px); box-shadow: 4px 4px 0 var(--ink); }
  .activity-card:active { transform: translate(0, 0); box-shadow: 2px 2px 0 var(--ink); }
  .activity-card.draft {
    opacity: 0.55; pointer-events: none; cursor: not-allowed;
    position: relative;
  }
  .activity-card.draft:hover { transform: none; box-shadow: none; }
  .card-draft-badge {
    position: absolute; top: 14px; right: 14px;
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    letter-spacing: 0.14em; padding: 3px 7px;
    background: var(--accent); color: var(--ink);
    border-radius: 12px; font-weight: 700; z-index: 2;
  }
  .card-stripe { height: 8px; background: var(--football); }
  .card-stripe.fielding         { background: var(--grass); }
  .card-stripe.striking         { background: var(--primary); }
  .card-stripe.throwing         { background: var(--secondary); }
  .card-stripe.throwing-catching { background: var(--accent); }
  .card-stripe.mixed            { background: var(--warm); }
  .card-body { padding: 14px 16px 16px; }
  .card-tag {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted);
    margin-bottom: 6px; display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
  }
  .card-tag .focus-chip {
    padding: 2px 7px; border-radius: 8px;
    color: var(--paper); font-weight: 700;
    background: var(--football);
  }
  .card-tag .focus-chip.fielding         { background: var(--grass); }
  .card-tag .focus-chip.striking         { background: var(--primary); }
  .card-tag .focus-chip.throwing         { background: var(--secondary); }
  .card-tag .focus-chip.throwing-catching { background: var(--accent); color: var(--ink); }
  .card-tag .focus-chip.mixed            { background: var(--warm); color: var(--ink); }
  .card-value {
    padding: 2px 7px; border-radius: 8px;
    color: var(--value); border: 1px solid var(--value);
    background: var(--value-soft);
    font-weight: 700;
  }
  .card-name {
    font-family: 'Oswald', sans-serif; font-weight: 700;
    font-size: 22px; letter-spacing: 0.03em; text-transform: uppercase;
    line-height: 1; margin-bottom: 6px;
  }
  .card-summary { font-size: 13px; color: var(--ink-soft); line-height: 1.4; margin-bottom: 12px; }
  .card-meta {
    display: flex; justify-content: space-between; align-items: center;
    padding-top: 10px; border-top: 1px solid var(--rule);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted);
  }
  .tier-dots { display: flex; gap: 3px; }
  .tier-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--rule); }
  .tier-dot.on { background: var(--football); }

  /* ============== ACTIVITY DETAIL MODE ============== */
  .hero {
    background: var(--ink); color: var(--paper);
    border-radius: 6px; padding: 22px 26px;
    position: relative; overflow: hidden;
    border: 2px solid var(--ink);
  }
  .hero::before {
    content: ""; position: absolute; inset: 0;
    background: repeating-linear-gradient(135deg, rgba(255,255,255,0.025) 0 2px, transparent 2px 14px);
    pointer-events: none;
  }
  .hero-row {
    display: flex; gap: 18px; align-items: center;
    position: relative; z-index: 1; flex-wrap: wrap;
  }
  .hero-text { flex: 1; min-width: 200px; }
  .hero-top {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(255,255,255,0.5); margin-bottom: 4px;
  }
  .hero h1 {
    font-family: 'Oswald', sans-serif; font-weight: 700;
    font-size: clamp(32px, 6vw, 52px);
    letter-spacing: 0.02em; text-transform: uppercase;
    line-height: 0.95; margin-bottom: 8px;
  }
  .hero h1 .accent { color: var(--accent); }
  .hero-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: rgba(255,255,255,0.65);
    letter-spacing: 0.08em; text-transform: uppercase;
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  }
  .chip { display: inline-block; padding: 3px 8px; border-radius: 10px; font-weight: 700; text-transform: uppercase; }
  .chip.focus     { background: var(--accent); color: var(--ink); }
  .chip.type      { background: var(--primary); color: var(--paper); }
  .chip.duration  { background: rgba(255,255,255,0.12); color: var(--paper); border: 1px solid rgba(255,255,255,0.25); }
  .print-btn {
    background: var(--paper); color: var(--ink);
    border: 2px solid var(--paper); width: 40px; height: 40px;
    border-radius: 6px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.12s;
  }
  .print-btn:hover { transform: translate(-1px, -1px); box-shadow: 2px 2px 0 var(--accent); }

  .tier-bar {
    margin-top: 14px;
    background: var(--paper); border: 1.5px solid var(--ink);
    border-radius: 6px; padding: 14px 18px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 14px; flex-wrap: wrap;
  }
  .label-text {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted);
    margin-bottom: 2px;
  }
  .label-tier { font-family: 'Oswald', sans-serif; font-size: 18px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--ink); }
  .label-years { font-size: 12px; color: var(--muted); }
  .tier-pills {
    display: flex; gap: 4px; padding: 4px;
    border: 1.5px solid var(--ink); border-radius: 6px; background: var(--bg);
  }
  .tier-pill {
    font-family: 'Oswald', sans-serif; font-weight: 600;
    font-size: 13px; letter-spacing: 0.06em;
    padding: 6px 14px; background: transparent; color: var(--ink);
    border: none; border-radius: 4px; cursor: pointer;
    text-transform: uppercase; transition: all 0.12s;
  }
  .tier-pill:hover:not(:disabled) { background: rgba(0,0,0,0.05); }
  .tier-pill.active { background: var(--ink); color: var(--paper); }
  .tier-pill:disabled { opacity: 0.3; cursor: not-allowed; }

  .plan { margin-top: 14px; display: grid; grid-template-columns: 1.4fr 1fr; gap: 14px; }
  @media (max-width: 760px) { .plan { grid-template-columns: 1fr; } }
  .objective-card {
    background: var(--ink); color: var(--paper);
    border: 2px solid var(--ink); border-radius: 6px;
    padding: 22px 24px; position: relative; overflow: hidden;
  }
  .objective-card::before {
    content: ""; position: absolute; top: -20px; right: -20px;
    width: 80px; height: 80px; background: var(--football);
    transform: rotate(45deg); opacity: 0.6;
  }
  .objective-card .tag {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 8px; position: relative; z-index: 1;
  }
  .objective-card .text {
    font-family: 'Oswald', sans-serif; font-weight: 600;
    font-size: clamp(18px, 2.5vw, 22px); line-height: 1.2;
    letter-spacing: 0.01em; position: relative; z-index: 1;
  }
  .success-card { background: var(--paper); border: 1.5px solid var(--ink); border-radius: 6px; padding: 18px 20px; }
  .card-label {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink-soft); margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .card-label::before { content: ""; width: 6px; height: 6px; background: var(--primary); border-radius: 50%; }
  .success-list { list-style: none; }
  .success-list li {
    font-size: 14px; padding: 6px 0; padding-left: 22px;
    position: relative; border-bottom: 1px solid var(--rule);
  }
  .success-list li:last-child { border-bottom: none; }
  .success-list li::before { content: "✓"; position: absolute; left: 0; color: var(--grass); font-weight: 700; }

  .value-card {
    margin-top: 14px;
    background: var(--value-soft);
    border: 1.5px solid var(--value);
    border-radius: 6px; padding: 18px 22px;
    display: grid; grid-template-columns: auto 1fr; gap: 16px; align-items: start;
  }
  .value-icon {
    width: 56px; height: 56px;
    background: var(--value); color: var(--paper);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; flex-shrink: 0;
  }
  .value-content .value-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--value); margin-bottom: 2px;
  }
  .value-content .value-name {
    font-family: 'Oswald', sans-serif; font-weight: 700;
    font-size: 22px; letter-spacing: 0.03em; text-transform: uppercase;
    margin-bottom: 8px; color: var(--ink);
  }
  .value-content .value-text { font-size: 14px; line-height: 1.55; color: var(--ink-soft); }

  .info-grid { margin-top: 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 720px) { .info-grid { grid-template-columns: 1fr; } }
  .info-card { background: var(--paper); border: 1.5px solid var(--ink); border-radius: 6px; padding: 16px 18px; }
  .info-card .text { font-size: 13.5px; color: var(--ink-soft); line-height: 1.5; }
  .eq-list { list-style: none; font-size: 13px; }
  .eq-list li {
    display: flex; justify-content: space-between; gap: 10px;
    padding: 4px 0; border-bottom: 1px dashed var(--rule);
  }
  .eq-list li:last-child { border-bottom: none; }
  .eq-list .qty { font-family: 'JetBrains Mono', monospace; color: var(--primary); font-weight: 700; font-size: 12px; white-space: nowrap; }

  .diagram-card {
    margin-top: 14px;
    background: var(--football-soft);
    border: 1.5px solid var(--ink);
    border-radius: 6px; padding: 14px;
  }
  .diagram-card svg { width: 100%; height: auto; display: block; }

  .section {
    margin-top: 14px;
    background: var(--paper); border: 1.5px solid var(--ink);
    border-radius: 6px; padding: 18px 20px;
  }
  .section h2 {
    font-family: 'Oswald', sans-serif; font-weight: 700;
    font-size: 16px; letter-spacing: 0.14em; text-transform: uppercase;
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .section h2::before { content: ""; width: 8px; height: 8px; background: var(--primary); border-radius: 50%; }
  .section.progressions h2::before { background: var(--football); }
  .section.questions    h2::before { background: var(--grass); }
  .section.cues         h2::before { background: var(--primary); }
  .section.errors       h2::before { background: var(--accent); }

  /* CUES */
  .cues { display: flex; flex-direction: column; gap: 8px; }
  .cue {
    background: var(--bg); border-left: 3px solid var(--primary);
    padding: 8px 12px; border-radius: 0 4px 4px 0;
  }
  .cue-phrase {
    font-family: 'Oswald', sans-serif; font-weight: 600;
    font-size: 15px; letter-spacing: 0.02em;
  }
  .cue-meta {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase;
    margin-top: 3px; display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
  }
  .cue-ref {
    background: var(--ink); color: var(--paper);
    padding: 2px 6px; border-radius: 6px; font-weight: 700;
  }

  /* ISSUES / ERRORS */
  .issues { display: flex; flex-direction: column; gap: 8px; }
  .issue {
    background: var(--bg); border: 1px solid var(--rule);
    border-left: 3px solid var(--accent);
    padding: 10px 12px; border-radius: 0 4px 4px 0;
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 12px; font-size: 13px;
  }
  @media (max-width: 640px) { .issue { grid-template-columns: 1fr; gap: 4px; } }
  .issue .col-label {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 2px;
  }

  .steps { list-style: none; counter-reset: stepcount; }
  .steps li {
    counter-increment: stepcount; padding: 6px 0 6px 36px;
    position: relative; font-size: 14px; line-height: 1.5;
  }
  .steps li::before {
    content: counter(stepcount, decimal-leading-zero);
    position: absolute; left: 0; top: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 700;
    color: var(--primary); letter-spacing: 0.06em;
  }

  .progressions-list { list-style: none; }
  .prog-item {
    display: grid; grid-template-columns: auto 1fr; gap: 14px;
    padding: 10px 0; border-bottom: 1px solid var(--rule);
    align-items: start;
  }
  .prog-item:last-child { border-bottom: none; }
  .prog-step {
    width: 32px; height: 32px;
    background: var(--football); color: var(--paper);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 14px;
    flex-shrink: 0;
  }
  .prog-step.l1 { background: #4a6080; }
  .prog-step.l2 { background: #3a4f6e; }
  .prog-step.l3 { background: var(--football); }
  .prog-step.l4 { background: #0d1c3a; }
  .prog-step.l5 { background: #050d22; }
  .prog-text { font-size: 14px; line-height: 1.5; color: var(--ink); padding-top: 4px; }
  .prog-label {
    display: block;
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted);
    margin-bottom: 2px;
  }

  .questions { list-style: none; display: flex; flex-direction: column; gap: 4px; }
  .questions li {
    padding: 4px 0 4px 24px; position: relative;
    font-style: italic; font-size: 14px; color: var(--ink-soft);
  }
  .questions li::before {
    content: "?"; position: absolute; left: 0; top: 4px;
    color: var(--primary); font-weight: 700;
    font-family: 'Oswald', sans-serif; font-size: 16px;
  }

  .step-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  @media (max-width: 540px) { .step-grid { grid-template-columns: 1fr; } }
  .step-mod { background: var(--bg); border: 1px solid var(--rule); padding: 10px 12px; border-radius: 4px; }
  .step-mod .label {
    font-family: 'Oswald', sans-serif; font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--primary); margin-bottom: 4px;
  }
  .step-mod .text { font-size: 13px; color: var(--ink-soft); }

  .show-card {
    margin-top: 14px;
    background: var(--paper);
    border: 1.5px solid var(--ink);
    border-left: 5px solid var(--warm);
    border-radius: 6px; padding: 16px 20px;
    display: grid; grid-template-columns: auto 1fr; gap: 14px; align-items: start;
  }
  .show-icon {
    width: 36px; height: 36px;
    background: var(--warm); color: var(--ink);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .show-content .show-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink-soft); margin-bottom: 4px;
  }
  .show-content .show-text { font-size: 13.5px; line-height: 1.55; color: var(--ink); }

  .pair-with {
    margin-top: 14px; padding: 16px 20px;
    background: var(--paper); border: 1.5px dashed var(--rule); border-radius: 6px;
  }
  .pair-with .label {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink-soft); margin-bottom: 8px;
  }
  .pair-list { display: flex; gap: 6px; flex-wrap: wrap; }
  .pair-list a {
    text-decoration: none; font-size: 12px;
    padding: 4px 10px; background: var(--bg);
    border: 1px solid var(--ink); border-radius: 12px; color: var(--ink);
  }
  .pair-list a:hover { background: var(--ink); color: var(--paper); }

  .loading, .error-state {
    background: var(--paper); border: 1.5px solid var(--ink);
    border-radius: 6px; padding: 40px 20px;
    text-align: center; color: var(--muted);
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    letter-spacing: 0.12em; text-transform: uppercase;
  }
  .error-state { color: var(--primary); }

  .footer {
    margin-top: 18px; padding: 14px 18px;
    background: var(--ink); color: rgba(255,255,255,0.6);
    border-radius: 6px;
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    flex-wrap: wrap; gap: 8px;
  }
  .footer .accent { color: var(--accent); }
  .footer a { color: rgba(255,255,255,0.6); text-decoration: none; }
  .footer a:hover { color: var(--accent); }

  @media print {
    body { padding: 0; background: white; }
    .crumb, .print-btn, .tier-pills, .footer, .filters { display: none; }
    .hero { background: white; color: black; border: 2px solid black; }
    .hero::before { display: none; }
    .hero h1, .hero h1 .accent { color: black; }
    .objective-card { background: white; color: black; border: 2px solid black; }
    .objective-card::before { display: none; }
  }
</style>
</head>
<body>

<div class="board" id="board">
  <div class="loading">Loading…</div>
</div>

<script src="../../shared/lineup.js"></script>
<script src="../../shared/lineup-ui.js"></script>
<script>
/* ============================================================
   DATA-DRIVEN RENDERER
   - No ?id= → library mode (lists all activities from manifest)
   - ?id=<slug> → detail mode (loads <slug>.json, renders activity)
   ============================================================ */
const tierMeta = {
  ks1:  { name: 'Years 1–2', years: 'ages 5–7' },
  lks2: { name: 'Years 3–4', years: 'ages 7–9' },
  uks2: { name: 'Years 5–6', years: 'ages 9–11' }
};

const focusLabels = {
  'striking': 'Striking', 'fielding': 'Fielding', 'throwing': 'Throwing',
  'throwing-catching': 'Throw·Catch', 'mixed': 'Mixed'
};

let manifest = null;
let activity = null;
let currentTier = 'lks2';
let activeFilters = { tier: 'all', focus: 'all', value: 'all' };

async function init() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  try {
    if (id) {
      activity = await fetch(`data/${id}.json`).then(r => {
        if (!r.ok) throw new Error('Activity not found');
        return r.json();
      });
      currentTier = activity.defaultTier || 'lks2';
      document.title = `${activity.name} · Cricket · Coach Tools`;
      renderActivity();
    } else {
      manifest = await fetch('data/_manifest.json').then(r => r.json());
      renderLibrary();
    }
  } catch (e) {
    document.getElementById('board').innerHTML = `<div class="error-state">Error: ${e.message}</div>`;
  }
}

/* ====================== LIBRARY MODE ====================== */

  const a = manifest.activities;
  const values = [...new Set(a.map(x => x.value).filter(Boolean))];

  document.getElementById('board').innerHTML = `
    <div class="crumb">

      </div>
      ${values.length > 0 ? `<div class="filter-group">
        <div class="filter-label">Character value</div>
        <div class="pills" data-filter="value">
          <button class="pill active" data-val="all">All</button>
          ${values.map(v => `<button class="pill" data-val="${v}">${v}</button>`).join('')}

      </div>` : ''}

    <div class="activity-grid" id="grid"></div>

    <footer class="footer">
      <span><span class="accent">●</span> <a href="../../">Coach Tools</a></span>
      <span>Cricket · activities library</span>
      <span>v1.2</span>
    </footer>
  `;

  document.querySelectorAll('.pills').forEach(group => {
    const name = group.dataset.filter;
    group.querySelectorAll('.pill').forEach(p => {
      p.addEventListener('click', () => {
        group.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
        p.classList.add('active');
        activeFilters[name] = p.dataset.val;
        renderGrid();
      });
    });
  });

  renderGrid();

  // v1.3: wire the lineup (per-discipline planning basket)
  if (typeof LineupUI !== 'undefined') {
    LineupUI.init({
      discipline: 'cricket',
      badgeMountSelector: '#lineup-badge-mount',
      sessionPagePath: '../sessions/',
      activities: manifest.activities
    });
  }
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const filtered = manifest.activities.filter(x => {
    if (activeFilters.tier !== 'all' && !x.tiers.includes(activeFilters.tier)) return false;
    if (activeFilters.focus !== 'all' && x.focus !== activeFilters.focus) return false;
    if (activeFilters.value !== 'all' && x.value !== activeFilters.value) return false;
    return true;
  });

  if (!filtered.length) {
    grid.innerHTML = `<div class="loading" style="grid-column: 1/-1;">No activities match these filters.</div>`;
    return;
  }

  grid.innerHTML = filtered.map(x => {
    const tierDots = ['ks1', 'lks2', 'uks2'].map(t =>
      `<span class="tier-dot ${x.tiers.includes(t) ? 'on' : ''}" title="${t}"></span>`
    ).join('');
    const isDraft = x.ready === false;
    return `
      <a class="activity-card ${isDraft ? 'draft' : ''}" href="${isDraft ? '#' : `?id=${x.id}`}" ${isDraft ? 'onclick="return false;"' : ''}>
        <div class="card-stripe ${x.focus}"></div>
        ${isDraft ? '<div class="card-draft-badge">DRAFT</div>' : ''}
        ${!isDraft && typeof LineupUI !== 'undefined' ? LineupUI.renderToggle(x.id) : ''}
        <div class="card-body">
          <div class="card-tag">
            <span class="focus-chip ${x.focus}">${x.focusLabel}</span>
            ${x.value ? `<span class="card-value">${x.value}</span>` : ''}
          </div>
          <div class="card-name">${x.name}</div>
          <div class="card-summary">${x.summary}</div>
          <div class="card-meta">
            <div class="tier-dots">${tierDots}</div>
            <span>⏱ ${x.duration}</span>
          </div>
        </div>
      </a>
    `;
  }).join('');
}

/* ====================== ACTIVITY DETAIL ====================== */
function resolveActivity() {
  const t = activity.tiers[currentTier];
  const delta = (activity.tierDeltas && activity.tierDeltas[currentTier]) || {};
  const base = activity.base;
  return {
    duration: t.duration,
    objective: t.objective,
    successCriteria: t.successCriteria,
    space: (activity.space.tierOverrides && activity.space.tierOverrides[currentTier]?.description) || activity.space.description,
    steps:        delta.steps        || base.steps,
    cues:         delta.cues         || base.cues,
    errors:       delta.errors       || base.errors,
    progressions: delta.progressions || base.progressions,
    questions:    delta.questions    || base.questions,
    step:         delta.step         || base.step,
    showmanship:  delta.showmanship  || base.showmanship
  };
}

function getDiagram(name) {
  switch (name) {
    case 'cr-pairs-catch':       return crPairsCatchDiagram();
    case 'cr-long-barrier':      return crLongBarrierDiagram();
    case 'cr-bats-pitch':        return crBatsPitchDiagram();
    case 'cr-oval-circle':       return crOvalCircleDiagram();
    case 'cr-batting-dodgeball': return crBattingDodgeballDiagram();
    case 'cr-scatterball':       return crScatterballDiagram();
    case 'cr-through-gate':      return crThroughGateDiagram();
    case 'cr-cone-raiders':      return crConeRaidersDiagram();
    case 'cr-monster-ball':      return crMonsterBallDiagram();
    case 'cr-caterpillar':       return crCaterpillarDiagram();
    case 'cr-six-or-safe':       return crSixOrSafeDiagram();
    case 'cr-bowling-relay':     return crBowlingRelayDiagram();
    case 'cr-catching-target-line': return crCatchingTargetLineDiagram();
    case 'cr-three-tees-2':      return crThreeTees2Diagram();
    default:                     return crPairsCatchDiagram();
  }
}

function renderActivity() {
  const r = resolveActivity();
  const m = tierMeta[currentTier];

  const availableTiers = Object.keys(activity.tiers);
  const tierPillsHTML = ['ks1', 'lks2', 'uks2'].map(t =>
    `<button class="tier-pill ${t === currentTier ? 'active' : ''}" data-tier="${t}" ${!availableTiers.includes(t) ? 'disabled' : ''}>${t === 'ks1' ? 'Y1–2' : t === 'lks2' ? 'Y3–4' : 'Y5–6'}</button>`
  ).join('');

  const pairWithHTML = activity.pairWith && activity.pairWith.length ?
    `<div class="pair-with">
      <div class="label">Pairs well with</div>
      <div class="pair-list">${activity.pairWith.map(id => {
        const partner = manifest && manifest.activities.find(a => a.id === id);
        const name = partner ? partner.name : id;
        return `<a href="?id=${id}">${name}</a>`;
      }).join('')}</div>
    </div>` : '';

  document.getElementById('board').innerHTML = `
    <div class="crumb">
      <a href="../../">Coach Tools</a>
      <span class="sep">/</span>
      <a href="../">Cricket</a>
      <span class="sep">/</span>

          <div class="hero-top">● Activity${activity.source ? ' · ' + activity.source : ''}</div>
          <h1>${activity.name}</h1>
          <div class="hero-sub">
            <span class="chip focus">${activity.focusLabel}</span>
            <span class="chip type">${activity.typeLabel}</span>
            <span class="chip duration">⏱ <span id="durationLabel">${r.duration} min</span></span>
          </div>
        </div>
        <button class="print-btn" onclick="window.print()" aria-label="Print">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 6 2 18 2 18 9"></polyline>
            <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
            <rect x="6" y="14" width="12" height="8"></rect>
          </svg>
        </button>
      </div>
    </header>

    <div class="tier-bar">
      <div>
        <div class="label-text">Adapted for</div>
        <div class="label-tier">${m.name}</div>
        <div class="label-years">${m.years}</div>
      </div>
      <div class="tier-pills">${tierPillsHTML}</div>
    </div>

    <section class="plan">
      <div class="objective-card">
        <div class="tag">▸ Objective</div>
        <div class="text">${r.objective}</div>
      </div>
      <div class="success-card">
        <div class="card-label">Success looks like</div>
        <ul class="success-list">${r.successCriteria.map(s => `<li>${s}</li>`).join('')}</ul>
      </div>
    </section>

    ${activity.value ? `
      <div class="value-card">
        <div class="value-icon">♥</div>
        <div class="value-content">
          <div class="value-label">▸ Character / value focus</div>
          <div class="value-name">${activity.value.name}</div>
          <div class="value-text">${activity.value.text}</div>
        </div>
      </div>
    ` : ''}

    <div class="info-grid">
      <div class="info-card">
        <div class="card-label">Space</div>
        <div class="text">${r.space}</div>
      </div>
      <div class="info-card">
        <div class="card-label">Equipment</div>
        <ul class="eq-list">
          ${activity.equipment.map(e => `<li><span>${e.item}</span><span class="qty">${e.qty}</span></li>`).join('')}
        </ul>
      </div>
    </div>

    <div class="diagram-card">${getDiagram(activity.diagram)}</div>

    <section class="section">
      <h2>How it runs</h2>
      <ol class="steps">${r.steps.map(s => `<li>${s}</li>`).join('')}</ol>
    </section>

    ${r.cues && r.cues.length ? `
      <section class="section cues">
        <h2>What to say</h2>
        <div class="cues">
          ${r.cues.map(c => `
            <div class="cue">
              <div class="cue-phrase">${c.phrase}</div>
              <div class="cue-meta">
                <span>when: ${c.trigger}</span>
                ${c.ref ? `<span class="cue-ref">⇢ ${c.ref}</span>` : ''}
              </div>
            </div>`).join('')}
        </div>
      </section>
    ` : ''}

    ${r.errors && r.errors.length ? `
      <section class="section errors">
        <h2>Watch out for</h2>
        <div class="issues">
          ${r.errors.map(e => `
            <div class="issue">
              <div><div class="col-label">Issue</div>${e.issue}</div>
              <div><div class="col-label">Likely cause</div>${e.cause}</div>
              <div><div class="col-label">Try this</div>${e.fix}</div>
            </div>`).join('')}
        </div>
      </section>
    ` : ''}

    ${r.progressions ? `
      <section class="section progressions">
        <h2>Progressions</h2>
        <div class="progressions-list">
          ${r.progressions.map((p, i) => `
            <div class="prog-item">
              <div class="prog-step l${Math.min(i + 1, 5)}">${i + 1}</div>
              <div>
                <span class="prog-label">${i === 0 ? 'Start here' : i === r.progressions.length - 1 ? 'Top of the ladder' : 'Step ' + (i + 1)}</span>
                <div class="prog-text">${p}</div>
              </div>
            </div>`).join('')}
        </div>
      </section>
    ` : ''}

    ${r.questions ? `
      <section class="section questions">
        <h2>Coach questions</h2>
        <ul class="questions">${r.questions.map(q => `<li>${q}</li>`).join('')}</ul>
      </section>
    ` : ''}

    <section class="section">
      <h2>STEP modifications</h2>
      <div class="step-grid">
        <div class="step-mod"><div class="label">Space</div><div class="text">${r.step.space}</div></div>
        <div class="step-mod"><div class="label">Task</div><div class="text">${r.step.task}</div></div>
        <div class="step-mod"><div class="label">Equipment</div><div class="text">${r.step.equipment}</div></div>
        <div class="step-mod"><div class="label">People</div><div class="text">${r.step.people}</div></div>
      </div>
    </section>

    ${r.showmanship ? `
      <div class="show-card">
        <div class="show-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 11l18-5v12L3 13v-2z"/>
            <path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/>
          </svg>
        </div>
        <div class="show-content">
          <div class="show-label">▸ Showmanship · what to highlight</div>
          <div class="show-text">${r.showmanship}</div>
        </div>
      </div>
    ` : ''}

    ${pairWithHTML}

    <footer class="footer">
      <span><span class="accent">●</span> <a href="../../">Coach Tools</a></span>
      <span>${activity.name} · Cricket activity</span>
      <span>v1.2</span>
    </footer>
  `;

  // After render, also load manifest for pair-with labels if not loaded
  if (!manifest && activity.pairWith && activity.pairWith.length) {
    fetch('data/_manifest.json').then(r => r.json()).then(m => {
      manifest = m;
      // re-render pair-with section with proper names
      const pairList = document.querySelector('.pair-list');
      if (pairList) {
        pairList.innerHTML = activity.pairWith.map(id => {
          const partner = manifest.activities.find(a => a.id === id);
          return `<a href="?id=${id}">${partner ? partner.name : id}</a>`;
        }).join('');
      }
    });
  }

  document.querySelectorAll('.tier-pill').forEach(p => {
    p.addEventListener('click', () => {
      if (p.disabled) return;
      currentTier = p.dataset.tier;
      renderActivity();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });
}

init();
</script>

</body>
</html>
