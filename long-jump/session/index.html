<style>
  :root {
    --bg: #F5F1E8;
    --paper: #FBF8F1;
    --ink: #15191E;
    --ink-soft: #3A4049;
    --muted: #6B7280;
    --line: #1F2329;
    --rule: #DAD3C4;
    --primary: #C8102E;
    --primary-deep: #8E0B20;
    --secondary: #142850;
    --accent: #F2B705;
    --accent-soft: #FFE89A;
    --grass: #6B8E4E;
    --grass-soft: #C7D9B0;
    --sand: #E8C99B;
    --sand-deep: #C99E60;
    --track: #B33B2C;
    --ok: #2F7A4D;
    --edit: #1E88E5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Manrope', sans-serif;
    font-size: 15px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
  }

  body {
    background-image:
      radial-gradient(circle at 15% 20%, rgba(200,16,46,0.04) 0, transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(20,40,80,0.04) 0, transparent 40%);
    min-height: 100vh;
    padding: 90px 18px 60px;
  }

  /* ============ TOP CONTROL BAR ============ */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0;
    background: var(--ink);
    color: white;
    z-index: 100;
    padding: 12px 18px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  .topbar-left {
    display: flex; align-items: center; gap: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: rgba(255,255,255,0.65);
  }
  .topbar-status {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    border-radius: 3px;
    font-weight: 700;
  }
  .topbar-status.viewing {
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.75);
  }
  .topbar-status.editing {
    background: var(--edit);
    color: white;
  }
  .topbar-status .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: currentColor;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; } 50% { opacity: 0.4; }
  }
  .save-indicator {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: rgba(255,255,255,0.5);
    transition: color 0.3s;
  }
  .save-indicator.saving { color: var(--accent); }
  .save-indicator.saved { color: rgba(255,255,255,0.5); }

  .topbar-right {
    display: flex; align-items: center; gap: 8px;
    flex-wrap: wrap;
  }
  .btn {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 7px 14px;
    border: 1.5px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.06);
    color: white;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.5); }
  .btn.primary {
    background: var(--edit);
    border-color: var(--edit);
  }
  .btn.primary:hover { background: #1976D2; border-color: #1976D2; }
  .btn.danger {
    background: transparent;
    border-color: rgba(255,255,255,0.25);
    color: rgba(255,255,255,0.7);
  }
  .btn.danger:hover {
    background: var(--primary);
    border-color: var(--primary);
    color: white;
  }
  .btn.gold {
    background: var(--accent);
    color: var(--ink);
    border-color: var(--accent);
  }
  .btn.gold:hover { background: #E0A800; border-color: #E0A800; }

  /* ============ EDIT MODE AFFORDANCES ============ */
  [contenteditable="true"] {
    outline: none;
    border-radius: 2px;
    transition: background 0.15s, box-shadow 0.15s;
  }
  body.editing [contenteditable="true"] {
    background: rgba(30,136,229,0.06);
    box-shadow: inset 0 0 0 1px rgba(30,136,229,0.25);
    cursor: text;
    min-width: 20px;
    min-height: 1em;
    display: inline-block;
  }
  body.editing .ov-list [contenteditable="true"],
  body.editing .crit-list [contenteditable="true"],
  body.editing .q-list [contenteditable="true"],
  body.editing .diff li [contenteditable="true"],
  body.editing .phrases [contenteditable="true"],
  body.editing .drill-row .v[contenteditable="true"],
  body.editing .pl-block [contenteditable="true"],
  body.editing .err-table td [contenteditable="true"] {
    display: block;
  }
  body.editing [contenteditable="true"]:hover {
    background: rgba(30,136,229,0.12);
    box-shadow: inset 0 0 0 1px rgba(30,136,229,0.5);
  }
  body.editing [contenteditable="true"]:focus {
    background: rgba(30,136,229,0.15);
    box-shadow: inset 0 0 0 2px var(--edit);
  }

  /* Block-level editable wrappers shouldn't be inline-block */
  body.editing .ov-list li > [contenteditable="true"],
  body.editing .crit-list li > [contenteditable="true"],
  body.editing .q-list li > [contenteditable="true"],
  body.editing .diff li > [contenteditable="true"],
  body.editing .phrase > [contenteditable="true"] {
    display: block;
    width: 100%;
  }

  /* Hide edit-only controls when not editing */
  .edit-only { display: none; }
  body.editing .edit-only { display: inline-flex; }
  body.editing .edit-only-block { display: block; }
  body.editing .edit-only-flex { display: flex; }

  /* Hide view-only controls when editing */
  body.editing .view-only { display: none; }

  /* Item controls (move/delete on lists & drills) */
  .item-controls {
    display: none;
    gap: 4px;
    align-items: center;
  }
  body.editing .item-controls { display: inline-flex; }
  .ic-btn {
    width: 22px; height: 22px;
    background: var(--paper);
    border: 1px solid var(--ink);
    color: var(--ink);
    font-size: 12px; line-height: 1;
    cursor: pointer;
    border-radius: 2px;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background 0.1s;
    padding: 0;
    font-weight: 700;
  }
  .ic-btn:hover { background: var(--accent); }
  .ic-btn.del { color: var(--primary); }
  .ic-btn.del:hover { background: var(--primary); color: white; }

  .add-btn {
    display: none;
    margin-top: 8px;
    background: rgba(30,136,229,0.08);
    border: 1.5px dashed var(--edit);
    color: var(--edit);
    font-family: 'Oswald';
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 8px 14px;
    border-radius: 3px;
    cursor: pointer;
    width: 100%;
    transition: background 0.15s;
  }
  body.editing .add-btn { display: block; }
  .add-btn:hover { background: rgba(30,136,229,0.18); }

  /* Drill card edit toolbar */
  .drill-toolbar {
    display: none;
    background: var(--ink);
    color: var(--paper);
    padding: 4px 8px;
    gap: 4px;
    align-items: center;
    justify-content: flex-end;
  }
  body.editing .drill-toolbar { display: flex; }
  .drill-toolbar .ic-btn {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.3);
    color: white;
  }
  .drill-toolbar .ic-btn:hover { background: var(--accent); color: var(--ink); border-color: var(--accent); }
  .drill-toolbar .ic-btn.del { color: rgba(255,255,255,0.8); }
  .drill-toolbar .ic-btn.del:hover { background: var(--primary); color: white; border-color: var(--primary); }

  /* List item layout in edit mode */
  body.editing .editable-list-item {
    display: flex;
    gap: 6px;
    align-items: flex-start;
  }
  .editable-list-item .item-controls {
    flex-shrink: 0;
    margin-top: 2px;
  }
  .editable-list-item .item-body {
    flex: 1;
  }

  /* ============ HERO ============ */
  .board {
    max-width: 1280px;
    margin: 0 auto;
  }

  .hero {
    background: var(--ink);
    color: var(--paper);
    border-radius: 6px;
    padding: 22px 28px 24px;
    position: relative;
    overflow: hidden;
    border: 2px solid var(--ink);
  }
  .hero::before {
    content: "";
    position: absolute; inset: 0;
    background: repeating-linear-gradient(135deg, rgba(255,255,255,0.025) 0 2px, transparent 2px 14px);
    pointer-events: none;
  }
  .hero-top {
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    margin-bottom: 14px;
  }
  .hero-tag { color: var(--accent); }
  .hero h1 {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: clamp(36px, 5vw, 58px);
    letter-spacing: 0.02em;
    text-transform: uppercase;
    line-height: 0.95;
    margin-bottom: 16px;
  }
  .hero h1 .accent { color: var(--primary); }
  .theme-strip {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Oswald', sans-serif;
    font-size: clamp(20px, 2.6vw, 30px);
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    flex-wrap: wrap;
  }
  .theme-word {
    background: var(--accent);
    color: var(--ink);
    padding: 6px 18px 4px;
    border-radius: 3px;
    box-shadow: 4px 4px 0 var(--primary);
  }
  .theme-arrow { color: var(--accent); font-size: 1.4em; line-height: 1; }
  .hero-meta {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-top: 22px;
    border-top: 1px solid rgba(255,255,255,0.12);
    padding-top: 16px;
  }
  .hero-meta-item .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-bottom: 4px;
  }
  .hero-meta-item .value {
    font-family: 'Oswald', sans-serif;
    font-size: 18px; font-weight: 600;
    color: var(--paper);
    letter-spacing: 0.02em;
  }
  @media (max-width: 720px) {
    .hero-meta { grid-template-columns: repeat(2, 1fr); }
  }

  /* ============ GRID & SECTIONS ============ */
  .grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 16px;
    margin-top: 18px;
  }
  .col-12 { grid-column: span 12; }
  .col-8  { grid-column: span 8; }
  .col-6  { grid-column: span 6; }
  .col-5  { grid-column: span 5; }
  .col-4  { grid-column: span 4; }
  .col-7  { grid-column: span 7; }
  @media (max-width: 960px) {
    .col-8, .col-6, .col-5, .col-4, .col-7 { grid-column: span 12; }
  }

  .card {
    background: var(--paper);
    border: 1.5px solid var(--line);
    border-radius: 6px;
    padding: 20px 22px 22px;
    position: relative;
  }

  .section-tag {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .section-tag .num {
    background: var(--ink);
    color: var(--paper);
    width: 22px; height: 22px;
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 12px;
    border-radius: 3px;
  }
  .section-tag .num.red { background: var(--primary); }
  .section-tag .num.navy { background: var(--secondary); }
  .section-tag .num.gold { background: var(--accent); color: var(--ink); }
  .section-tag .num.grass { background: var(--grass); }

  .section-title {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 26px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    line-height: 1;
    margin-bottom: 14px;
    color: var(--ink);
  }
  .section-title .pipe {
    display: inline-block;
    width: 4px; height: 22px;
    background: var(--primary);
    margin-right: 10px; vertical-align: -3px;
  }

  /* ============ OVERVIEW SECTION ============ */
  .overview-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }
  @media (max-width: 720px) { .overview-grid { grid-template-columns: 1fr; } }

  .overview-block { display: flex; flex-direction: column; gap: 6px; }
  .ov-head {
    font-family: 'Oswald', sans-serif;
    font-weight: 600; font-size: 13px;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--secondary);
    display: flex; align-items: center; gap: 8px;
  }
  .ov-head .icon {
    width: 18px; height: 18px;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--primary);
  }
  .ov-list { list-style: none; padding: 0; }
  .ov-list li {
    padding: 4px 0 4px 16px;
    position: relative;
    font-size: 14px;
    border-bottom: 1px dashed var(--rule);
  }
  .ov-list li:last-child { border-bottom: none; }
  .ov-list li::before {
    content: "▸";
    position: absolute; left: 0;
    color: var(--primary);
    font-size: 12px;
  }

  .objectives {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    margin-top: 4px;
  }
  @media (max-width: 720px) { .objectives { grid-template-columns: 1fr; } }
  .obj {
    border: 1.5px solid var(--ink);
    background: var(--paper);
    padding: 10px 12px;
    position: relative;
  }
  .obj-num {
    position: absolute; top: -10px; left: 10px;
    background: var(--primary); color: white;
    font-family: 'Oswald', sans-serif; font-weight: 700;
    font-size: 13px;
    padding: 1px 8px;
    letter-spacing: 0.05em;
  }
  .obj-text { font-size: 13px; padding-top: 4px; line-height: 1.4; }

  .cue-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .cue-pill {
    background: var(--accent);
    color: var(--ink);
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 5px 12px 4px;
    border-radius: 2px;
    border: 1.5px solid var(--ink);
    box-shadow: 2px 2px 0 var(--ink);
    position: relative;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .cue-pill.red { background: var(--primary); color: white; }
  .cue-pill .del-pill {
    display: none;
    width: 16px; height: 16px;
    background: var(--ink);
    color: white;
    border-radius: 50%;
    font-size: 10px;
    align-items: center; justify-content: center;
    cursor: pointer;
    border: none;
    padding: 0;
    line-height: 1;
  }
  body.editing .cue-pill .del-pill { display: inline-flex; }

  .safety {
    background: rgba(200,16,46,0.06);
    border-left: 4px solid var(--primary);
    padding: 10px 14px;
    border-radius: 0 4px 4px 0;
    margin-top: 4px;
  }
  .safety .ov-head { color: var(--primary); }

  /* ============ FACILITY DIAGRAM ============ */
  .diagram-card { padding-bottom: 14px; }
  .diagram-wrap {
    background: #F0EBDD;
    border: 1.5px solid var(--ink);
    border-radius: 4px;
    padding: 10px;
    margin-top: 6px;
    position: relative;
  }
  .diagram-wrap svg {
    width: 100%; height: auto; display: block;
  }
  .static-note {
    display: none;
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-align: right;
    letter-spacing: 0.06em;
  }
  body.editing .static-note { display: block; }
  .legend {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 6px 14px;
    margin-top: 10px;
    font-size: 12px;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 1.5px solid var(--ink);
    flex-shrink: 0;
  }
  .legend-square {
    width: 14px; height: 14px;
    border: 1.5px solid var(--ink);
    flex-shrink: 0;
  }

  /* ============ TIMELINE ============ */
  .timeline {
    display: grid;
    gap: 4px;
    margin: 8px 0 14px;
    border: 1.5px solid var(--ink);
    border-radius: 4px;
    overflow: hidden;
    height: 78px;
  }
  .tl-block {
    padding: 8px 12px;
    color: white;
    display: flex; flex-direction: column; justify-content: space-between;
    position: relative;
    overflow: hidden;
  }
  .tl-block .tl-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.06em;
    opacity: 0.85;
  }
  .tl-block .tl-name {
    font-family: 'Oswald', sans-serif;
    font-weight: 700; font-size: 16px;
    letter-spacing: 0.04em; text-transform: uppercase;
    line-height: 1;
  }
  .tl-block .tl-mins {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    opacity: 0.85;
    align-self: flex-end;
  }
  .tl-c-1 { background: var(--secondary); }
  .tl-c-2 { background: var(--grass); }
  .tl-c-3 { background: var(--primary); }
  .tl-c-4 { background: var(--ink); }
  .tl-axis {
    display: flex; justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--muted);
    margin-top: 4px;
    padding: 0 2px;
  }
  .tl-mins-input {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.4);
    color: white;
    font-family: inherit;
    font-size: inherit;
    width: 36px;
    padding: 1px 4px;
    border-radius: 2px;
    text-align: right;
  }

  /* ============ INTRO / DEMO ============ */
  .demo-grid {
    display: grid;
    grid-template-columns: 1fr 1.2fr;
    gap: 16px;
    align-items: stretch;
  }
  @media (max-width: 720px) { .demo-grid { grid-template-columns: 1fr; } }
  .demo-visual {
    background: var(--secondary);
    border-radius: 6px;
    padding: 18px;
    color: white;
    position: relative;
    overflow: hidden;
    min-height: 200px;
    display: flex; flex-direction: column;
    justify-content: space-between;
  }
  .demo-visual h4 {
    font-family: 'Oswald', sans-serif; font-size: 18px;
    text-transform: uppercase; letter-spacing: 0.04em;
    margin-bottom: 6px;
  }
  .demo-visual p { font-size: 13px; opacity: 0.9; }
  .script-box {
    border: 1.5px solid var(--ink);
    border-left: 6px solid var(--primary);
    padding: 12px 14px;
    background: var(--paper);
    border-radius: 0 4px 4px 0;
  }
  .script-box .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.18em;
    color: var(--primary); text-transform: uppercase;
    margin-bottom: 6px;
  }
  .script-box .quote {
    font-family: 'Manrope', sans-serif;
    font-size: 14px; font-style: italic;
    line-height: 1.5;
    color: var(--ink);
  }
  .demo-link {
    margin-top: 10px;
    background: var(--accent-soft);
    padding: 10px 14px;
    border-radius: 4px;
    font-size: 13px;
    border-left: 4px solid var(--accent);
  }
  .demo-link strong { color: var(--ink); font-family: 'Oswald'; letter-spacing: 0.04em; text-transform: uppercase; font-size: 12px;}
  .ball-diagram { flex: 1; display: flex; justify-content: center; align-items: end; padding-top: 10px; }

  /* ============ DRILL CARDS ============ */
  .drills-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
    margin-top: 6px;
  }
  .drill {
    border: 1.5px solid var(--ink);
    border-radius: 4px;
    overflow: hidden;
    background: var(--paper);
    display: flex; flex-direction: column;
  }
  .drill-head {
    background: var(--secondary);
    color: white;
    padding: 8px 12px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px;
  }
  .drill-head .t {
    font-family: 'Oswald', sans-serif;
    font-weight: 600; font-size: 16px;
    text-transform: uppercase; letter-spacing: 0.03em;
    flex: 1;
  }
  .drill-head .n {
    background: var(--accent);
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 700;
    padding: 2px 7px;
    border-radius: 2px;
    flex-shrink: 0;
    min-width: 36px;
    text-align: center;
  }
  .drill-body { padding: 10px 12px; font-size: 13px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .drill-row { display: flex; gap: 8px; align-items: flex-start; }
  .drill-row .k {
    font-family: 'Oswald', sans-serif;
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--primary);
    min-width: 56px;
    flex-shrink: 0;
  }
  .drill-row .v { font-size: 13px; color: var(--ink-soft); flex: 1; }
  .drill-cue {
    background: var(--accent);
    border-top: 1.5px solid var(--ink);
    color: var(--ink);
    padding: 6px 12px;
    font-family: 'Oswald', sans-serif;
    font-weight: 600; font-size: 13px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    text-align: center;
  }
  .drill-cue::before { content: "💬 "; }
  .drill.feature { grid-column: span 2; }
  @media (max-width: 720px) { .drill.feature { grid-column: span 1; } }
  .drill.feature .drill-head { background: var(--primary); }
  .pop-steps {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px; margin: 6px 0 4px;
  }
  .pop-step {
    background: rgba(200,16,46,0.06);
    border: 1.5px solid var(--primary);
    padding: 8px 10px;
    border-radius: 3px;
    font-size: 12px;
  }
  .pop-step .ps-num {
    font-family: 'Oswald'; font-weight: 700;
    font-size: 22px; color: var(--primary);
    line-height: 1;
  }
  .pop-step .ps-t {
    font-family: 'Oswald'; font-weight: 600;
    text-transform: uppercase; font-size: 12px;
    letter-spacing: 0.04em;
    margin: 2px 0;
  }
  .pop-step .ps-d { font-size: 11px; color: var(--ink-soft); line-height: 1.3; }

  /* ============ MAIN ACTIVITY ============ */
  .main-grid {
    display: grid;
    grid-template-columns: 1.1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 960px) { .main-grid { grid-template-columns: 1fr; } }
  .rotation-vis {
    background: var(--paper);
    border: 1.5px solid var(--ink);
    border-radius: 4px;
    padding: 14px;
    position: relative;
  }
  .rotation-title {
    font-family: 'Oswald'; font-weight: 600;
    font-size: 14px; text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
    color: var(--secondary);
  }
  .rotation-svg { width: 100%; height: auto; }
  .roles {
    display: flex; flex-direction: column; gap: 10px;
  }
  .role {
    border: 1.5px solid var(--ink);
    border-radius: 4px;
    padding: 12px 14px;
    background: var(--paper);
    position: relative;
    padding-left: 56px;
  }
  .role::before {
    content: attr(data-icon);
    position: absolute; left: 12px; top: 18px;
    font-size: 26px; line-height: 1;
  }
  .role.jumpers { border-left: 6px solid var(--primary); }
  .role.spotters { border-left: 6px solid var(--secondary); }
  .role.helpers { border-left: 6px solid var(--grass); }
  .role h4 {
    font-family: 'Oswald'; font-weight: 700;
    font-size: 16px; text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
  }
  .role p { font-size: 13px; color: var(--ink-soft); }
  .role .qs {
    margin-top: 6px;
    background: rgba(20,40,80,0.05);
    padding: 6px 10px;
    border-radius: 3px;
    font-size: 12px;
    border-left: 3px solid var(--secondary);
  }
  .role .qs strong {
    font-family: 'Oswald'; text-transform: uppercase;
    font-size: 11px; letter-spacing: 0.1em;
    color: var(--secondary);
    display: block; margin-bottom: 2px;
  }
  .rotation-rules {
    margin-top: 14px;
    background: var(--ink);
    color: var(--paper);
    padding: 12px 14px;
    border-radius: 4px;
    font-size: 13px;
  }
  .rotation-rules h4 {
    font-family: 'Oswald'; font-size: 13px;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .rotation-rules ul { list-style: none; padding: 0; }
  .rotation-rules li {
    padding: 3px 0 3px 18px; position: relative;
    border-bottom: 1px dashed rgba(255,255,255,0.15);
  }
  .rotation-rules li:last-child { border-bottom: none; }
  .rotation-rules li::before {
    content: "→"; position: absolute; left: 0;
    color: var(--accent); font-weight: 700;
  }

  /* ============ COACHING POINTS ============ */
  .err-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .err-table thead { background: var(--ink); color: var(--paper); }
  .err-table th {
    text-align: left;
    padding: 7px 10px;
    font-family: 'Oswald';
    font-size: 12px; letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .err-table td {
    padding: 8px 10px;
    border-bottom: 1px solid var(--rule);
    vertical-align: top;
  }
  .err-table tr:nth-child(even) td { background: rgba(0,0,0,0.02); }
  .err-table .err { color: var(--primary); font-weight: 600; }
  .err-table .fix { color: var(--ok); }
  .err-table .fix-text::before { content: "✓ "; font-weight: 700; }

  .phrases { display: flex; flex-direction: column; gap: 6px; }
  .phrase {
    padding: 8px 12px;
    background: var(--accent-soft);
    border-left: 4px solid var(--accent);
    border-radius: 0 3px 3px 0;
    font-size: 13px;
    font-style: italic;
  }
  .phrase::before { content: "🗣 "; font-style: normal; }

  /* ============ DIFFERENTIATION ============ */
  .diff-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  @media (max-width: 720px) { .diff-grid { grid-template-columns: 1fr; } }
  .diff {
    padding: 14px;
    border-radius: 4px;
    border: 1.5px solid var(--ink);
  }
  .diff.support {
    background: rgba(20,40,80,0.05);
    border-left: 6px solid var(--secondary);
  }
  .diff.stretch {
    background: rgba(200,16,46,0.05);
    border-left: 6px solid var(--primary);
  }
  .diff h4 {
    font-family: 'Oswald'; font-weight: 700;
    font-size: 16px; text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .diff h4 .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 700;
    background: var(--ink); color: var(--paper);
    padding: 2px 6px; border-radius: 2px;
    letter-spacing: 0.1em;
  }
  .diff ul { list-style: none; padding: 0; }
  .diff li {
    padding: 5px 0 5px 18px;
    position: relative;
    font-size: 13px;
    border-bottom: 1px dashed var(--rule);
  }
  .diff li:last-child { border-bottom: none; }
  .diff.support li::before {
    content: "↓"; position: absolute; left: 0;
    color: var(--secondary); font-weight: 700;
  }
  .diff.stretch li::before {
    content: "↑"; position: absolute; left: 0;
    color: var(--primary); font-weight: 700;
  }

  /* ============ PLENARY ============ */
  .plenary-grid {
    display: grid;
    grid-template-columns: 1.1fr 1fr 1fr;
    gap: 12px;
  }
  @media (max-width: 960px) { .plenary-grid { grid-template-columns: 1fr; } }
  .pl-block {
    padding: 14px;
    border: 1.5px solid var(--ink);
    border-radius: 4px;
    background: var(--paper);
  }
  .pl-block h4 {
    font-family: 'Oswald';
    font-size: 13px; text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
    color: var(--secondary);
  }
  .pl-block.questions { border-top: 6px solid var(--secondary); }
  .pl-block.recap { border-top: 6px solid var(--accent); }
  .pl-block.criteria { border-top: 6px solid var(--ok); }
  .q-list { list-style: none; padding: 0; counter-reset: q; }
  .q-list li {
    padding: 6px 0 6px 32px;
    position: relative;
    font-size: 13px;
    font-style: italic;
    border-bottom: 1px dashed var(--rule);
    counter-increment: q;
    min-height: 30px;
  }
  .q-list li:last-child { border-bottom: none; }
  .q-list li::before {

// ============================================================
// STATE
// ============================================================
const STORAGE_KEY = 'ct.lj.session.v1';
let state = loadState() || structuredClone(DEFAULTS);
let editMode = false;
let saveTimer = null;
let pendingDelete = null;

// ============================================================
// STORAGE
// ============================================================
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (e) {
    console.warn('Could not load saved state:', e);
    return null;
  }
}

function saveState() {
  showSaving();
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    console.warn('Could not save state:', e);
  }
}

function debouncedSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveState, 400);
}

function showSaving() {
  const el = document.getElementById('save-indicator');
  el.textContent = 'Saving…';
  el.classList.add('saving');
  el.classList.remove('saved');
  setTimeout(() => {
    el.textContent = 'Saved · in this browser';
    el.classList.remove('saving');
    el.classList.add('saved');
  }, 300);
}

function resetState() {
  state = structuredClone(DEFAULTS);
  saveState();
  render();
}

// ============================================================
// PATH HELPERS
// ============================================================
function getByPath(obj, path) {
  return path.split('.').reduce((acc, key) => {
    if (acc == null) return undefined;
    const i = parseInt(key, 10);
    return acc[isNaN(i) ? key : i];
  }, obj);
}

function setByPath(obj, path, value) {
  const keys = path.split('.');
  const last = keys.pop();
  const target = keys.reduce((acc, key) => {
    const i = parseInt(key, 10);
    return acc[isNaN(i) ? key : i];
  }, obj);
  const lastI = parseInt(last, 10);
  target[isNaN(lastI) ? last : lastI] = value;
}

// ============================================================
// EDIT MODE
// ============================================================
function toggleEditMode() {
  editMode = !editMode;
  document.body.classList.toggle('editing', editMode);
  const status = document.getElementById('status');
  const statusText = document.getElementById('status-text');
  const btnEdit = document.getElementById('btn-edit');
  if (editMode) {
    status.classList.remove('viewing');
    status.classList.add('editing');
    statusText.textContent = 'EDITING';
    btnEdit.textContent = '✓ Done';
    btnEdit.classList.add('gold');
    btnEdit.classList.remove('primary');
  } else {
    status.classList.remove('editing');
    status.classList.add('viewing');
    statusText.textContent = 'VIEWING';
    btnEdit.textContent = '✎ Edit';
    btnEdit.classList.add('primary');
    btnEdit.classList.remove('gold');
  }
}

// ============================================================
// RENDER HELPERS
// ============================================================
function ed(path, content, opts) {
  opts = opts || {};
  const tag = opts.tag || 'span';
  const cls = opts.cls ? ` class="${opts.cls}"` : '';
  return `<${tag}${cls} contenteditable="false" data-path="${path}">${content == null ? '' : content}</${tag}>`;
}

function itemCtrl(listPath, index, length) {
  return `
    <span class="item-controls">
      ${index > 0 ? `<button class="ic-btn" onclick="moveItem('${listPath}', ${index}, -1)" title="Move up">↑</button>` : `<span style="width:22px"></span>`}
      ${index < length - 1 ? `<button class="ic-btn" onclick="moveItem('${listPath}', ${index}, 1)" title="Move down">↓</button>` : `<span style="width:22px"></span>`}
      <button class="ic-btn del" onclick="askDelete('${listPath}', ${index})" title="Delete">×</button>
    </span>
  `;
}

// ============================================================
// MOVE / DELETE / ADD HANDLERS
// ============================================================
function moveItem(listPath, index, dir) {
  const list = getByPath(state, listPath);
  const newIndex = index + dir;
  if (newIndex < 0 || newIndex >= list.length) return;
  [list[index], list[newIndex]] = [list[newIndex], list[index]];
  saveState();
  render();
}

function askDelete(listPath, index) {
  pendingDelete = { listPath, index };
  const list = getByPath(state, listPath);
  const item = list[index];
  let label = 'this item';
  if (typeof item === 'object' && item.name) label = item.name;
  else if (typeof item === 'object' && item.text) label = item.text;
  else if (typeof item === 'string') {
    const stripped = item.replace(/<[^>]*>/g, '');
    label = stripped.length > 40 ? stripped.slice(0, 40) + '…' : stripped;
  }
  document.getElementById('delete-title').textContent = 'Delete this item?';
  document.getElementById('delete-text').textContent = `"${label}" will be permanently removed.`;
  document.getElementById('delete-modal').classList.add('show');
}

function confirmDelete() {
  if (pendingDelete) {
    const list = getByPath(state, pendingDelete.listPath);
    list.splice(pendingDelete.index, 1);
    saveState();
    render();
  }
  document.getElementById('delete-modal').classList.remove('show');
  pendingDelete = null;
}

function addDrill() {
  state.drills.push({
    name: "New Drill",
    duration: "30 s",
    setup: "Describe the setup.",
    purpose: "What this drill is for.",
    develops: "Movement quality it builds.",
    cue: "COACHING CUE"
  });
  saveState();
  render();
}

function addItem(listPath, defaultItem) {
  const list = getByPath(state, listPath);
  list.push(typeof defaultItem === 'string' ? defaultItem : structuredClone(defaultItem));
  saveState();
  render();
}

// ============================================================
// CUE PILL ADD / DELETE

function addCue() {
  state.overview.cues.push({ text: "New Cue", style: "" });

  render();
}

function deleteCue(index) {
  state.overview.cues.splice(index, 1);

  render();
}

function renderDrills() {

  const phrasesHTML = c.phrases.map((p, i) => `

            <button class="add-btn" style="margin-top:8px;" onclick="addItem('plenary.successCriteria', '…new success criterion')">+ Add criterion</button>

// ============================================================
// EDITABLE HANDLERS
// ============================================================
function attachEditableHandlers() {
  document.querySelectorAll('[data-path]').forEach(el => {
    el.setAttribute('contenteditable', 'true');
    el.addEventListener('input', onTextInput);
    el.addEventListener('blur', onTextBlur);
  });
}

function onTextInput(e) {
  // Save the raw HTML so bold/italic markup is preserved
  const path = e.target.dataset.path;
  let value = e.target.innerHTML;
  // For numeric fields (timeline minutes)
  if (path.endsWith('.minutes')) {
    const num = parseInt(e.target.textContent, 10);
    value = isNaN(num) ? 0 : num;
  }
  setByPath(state, path, value);
  debouncedSave();
}

function onTextBlur(e) {
  // For numeric fields, normalise display
  const path = e.target.dataset.path;
  if (path.endsWith('.minutes')) {
    const num = parseInt(e.target.textContent, 10);
    if (!isNaN(num)) {
      // Don't re-render here — it loses cursor. Re-render only on commit (e.g. mode toggle).
    }
  }
}
